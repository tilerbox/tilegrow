<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TileGrow - Interactive Map</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        #viewport {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
            cursor: grab;
        }

        #viewport:active {
            cursor: grabbing;
        }

        #map-container {
            position: absolute;
            transform-origin: center center;
            transition: transform 0.1s ease-out;
            will-change: transform;
        }

        .tile-grid {
            display: grid;
            gap: 4px;
            padding: 20px;
        }

        .tile {
            width: 150px;
            height: 150px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }

        .tile:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            z-index: 10;
        }

        .tile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .tile-label {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .tile:hover .tile-label {
            opacity: 1;
        }

        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        .btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
        }

        .btn:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        #info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 1000;
        }

        #info h1 {
            font-size: 18px;
            margin-bottom: 5px;
        }

        #info p {
            font-size: 12px;
            opacity: 0.7;
        }

        #zoom-level {
            position: fixed;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>🗺️ TileGrow Map</h1>
        <p>Pinch to zoom • Drag to pan</p>
    </div>

    <div id="zoom-level">Zoom: 100%</div>

    <div id="viewport">
        <div id="map-container">
            <div id="tile-grid" class="tile-grid"></div>
        </div>
    </div>

    <div id="controls">
        <button class="btn" onclick="resetView()">⌖ Reset</button>
        <button class="btn" onclick="animateZoomOut()">🔍 Zoom Out</button>
        <button class="btn" onclick="toggleLabels()">🏷️ Labels</button>
    </div>

    <script>
        // Tile data (will be populated)
        const tiles = [
            { name: 'alex', x: 0, y: 0 },
            { name: 'maria', x: 1, y: 0 },
            { name: 'john', x: 1, y: 1 },
            { name: 'anna', x: 0, y: 1 },
            { name: 'david', x: -1, y: 1 },
            { name: 'emma', x: -1, y: 0 },
            { name: 'james', x: -1, y: -1 },
            { name: 'sophia', x: 0, y: -1 },
            { name: 'robert', x: 1, y: -1 },
            { name: 'olivia', x: 2, y: -1 },
            { name: 'michael', x: 2, y: 0 },
            { name: 'isabella', x: 2, y: 1 },
            { name: 'william', x: 2, y: 2 },
            { name: 'ava', x: 1, y: 2 },
            { name: 'richard', x: 0, y: 2 },
            { name: 'mia', x: -1, y: 2 },
            { name: 'joseph', x: -2, y: 2 },
            { name: 'charlotte', x: -2, y: 1 },
            { name: 'thomas', x: -2, y: 0 },
            { name: 'amelia', x: -2, y: -1 }
        ];

        // Calculate bounds
        const minX = Math.min(...tiles.map(t => t.x));
        const maxX = Math.max(...tiles.map(t => t.x));
        const minY = Math.min(...tiles.map(t => t.y));
        const maxY = Math.max(...tiles.map(t => t.y));
        
        const cols = maxX - minX + 1;
        const rows = maxY - minY + 1;

        // Setup grid
        const grid = document.getElementById('tile-grid');
        grid.style.gridTemplateColumns = `repeat(${cols + 2}, 150px)`;
        grid.style.gridTemplateRows = `repeat(${rows + 2}, 150px)`;

        // Center offset
        const offsetX = 1 - minX;
        const offsetY = 1 - minY;

        // Create tiles
        tiles.forEach((tile, index) => {
            const tileEl = document.createElement('div');
            tileEl.className = 'tile';
            tileEl.style.gridColumn = tile.x + offsetX;
            tileEl.style.gridRow = (maxY - tile.y) + 1; // Invert Y for visual
            
            // Staggered animation
            tileEl.style.opacity = '0';
            tileEl.style.transform = 'scale(0.5)';
            setTimeout(() => {
                tileEl.style.opacity = '1';
                tileEl.style.transform = 'scale(1)';
            }, index * 50);
            
            tileEl.innerHTML = `
                <img src="tiles/${tile.name}.png" alt="${tile.name}" loading="lazy">
                <span class="tile-label">@${tile.name}</span>
            `;
            
            grid.appendChild(tileEl);
        });

        // Pan & Zoom logic
        let scale = 2.5;
        let translateX = 0;
        let translateY = 0;
        let isDragging = false;
        let lastX = 0;
        let lastY = 0;

        const container = document.getElementById('map-container');
        const viewport = document.getElementById('viewport');

        function updateTransform() {
            container.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
            document.getElementById('zoom-level').textContent = `Zoom: ${Math.round(scale * 100)}%`;
        }

        // Center initially
        function centerMap() {
            const vw = viewport.clientWidth;
            const vh = viewport.clientHeight;
            translateX = (vw - cols * 154) / 2;
            translateY = (vh - rows * 154) / 2;
            updateTransform();
        }

        // Touch events
        viewport.addEventListener('touchstart', handleStart, { passive: false });
        viewport.addEventListener('touchmove', handleMove, { passive: false });
        viewport.addEventListener('touchend', handleEnd);

        // Mouse events
        viewport.addEventListener('mousedown', handleMouseDown);
        viewport.addEventListener('mousemove', handleMouseMove);
        viewport.addEventListener('mouseup', handleMouseUp);
        viewport.addEventListener('wheel', handleWheel, { passive: false });

        function handleStart(e) {
            if (e.touches.length === 1) {
                isDragging = true;
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                // Pinch zoom
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                this.lastPinchDist = Math.sqrt(dx * dx + dy * dy);
            }
        }

        function handleMove(e) {
            if (e.touches.length === 1 && isDragging) {
                const dx = e.touches[0].clientX - lastX;
                const dy = e.touches[0].clientY - lastY;
                translateX += dx;
                translateY += dy;
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
                updateTransform();
                e.preventDefault();
            } else if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (this.lastPinchDist) {
                    const delta = dist - this.lastPinchDist;
                    scale = Math.max(0.5, Math.min(5, scale + delta * 0.01));
                    updateTransform();
                }
                this.lastPinchDist = dist;
                e.preventDefault();
            }
        }

        function handleEnd() {
            isDragging = false;
            this.lastPinchDist = null;
        }

        function handleMouseDown(e) {
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
            viewport.style.cursor = 'grabbing';
        }

        function handleMouseMove(e) {
            if (isDragging) {
                const dx = e.clientX - lastX;
                const dy = e.clientY - lastY;
                translateX += dx;
                translateY += dy;
                lastX = e.clientX;
                lastY = e.clientY;
                updateTransform();
            }
        }

        function handleMouseUp() {
            isDragging = false;
            viewport.style.cursor = 'grab';
        }

        function handleWheel(e) {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            scale = Math.max(0.3, Math.min(6, scale * delta));
            updateTransform();
        }

        // Control functions
        function resetView() {
            scale = 2.5;
            centerMap();
        }

        function animateZoomOut() {
            let currentScale = 4;
            const targetScale = 0.8;
            const step = (currentScale - targetScale) / 60; // 60 frames
            
            scale = currentScale;
            updateTransform();
            
            const animate = () => {
                if (scale > targetScale) {
                    scale -= step;
                    updateTransform();
                    requestAnimationFrame(animate);
                }
            };
            animate();
        }

        let labelsVisible = false;
        function toggleLabels() {
            labelsVisible = !labelsVisible;
            document.querySelectorAll('.tile-label').forEach(label => {
                label.style.opacity = labelsVisible ? '1' : '0';
                label.style.transition = labelsVisible ? 'opacity 0.2s' : 'none';
            });
        }

        // Double tap to zoom
        let lastTap = 0;
        viewport.addEventListener('touchend', (e) => {
            const currentTime = Date.now();
            if (currentTime - lastTap < 300) {
                // Double tap
                if (scale < 2) {
                    scale = 3;
                } else {
                    scale = 1;
                }
                updateTransform();
            }
            lastTap = currentTime;
        });

        // Initialize
        centerMap();
        
        // Auto-animate on load
        setTimeout(() => {
            animateZoomOut();
        }, 1000);
    </script>
</body>
</html>
