<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TileGrow - Hex Map</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%); 
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #viewport { 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            position: relative; 
            cursor: grab; 
        }
        #viewport:active { cursor: grabbing; }
        #map-container { 
            position: absolute; 
            transform-origin: center center; 
            will-change: transform;
        }
        
        .hex-grid {
            position: relative;
            width: 2000px;
            height: 2000px;
        }
        
        .hex-tile {
            position: absolute;
            width: 120px;
            height: 138px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }
        
        .hex-tile:hover {
            transform: scale(1.15);
            filter: drop-shadow(0 8px 20px rgba(99, 102, 241, 0.6));
            z-index: 1000;
        }
        
        .hex-tile.center-tile {
            filter: drop-shadow(0 0 30px rgba(251, 191, 36, 0.8));
            animation: pulse-center 2s ease-in-out infinite;
        }
        
        .hex-tile.center-tile:hover {
            filter: drop-shadow(0 0 40px rgba(251, 191, 36, 1));
        }
        
        @keyframes pulse-center {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .hex-shape {
            width: 100%;
            height: 100%;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .hex-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0.9;
        }
        
        .hex-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.2), rgba(0,0,0,0.5));
        }
        
        .hex-content {
            position: relative;
            z-index: 10;
            text-align: center;
            color: white;
        }
        
        .hex-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            margin: 0 auto 5px;
            border: 2px solid rgba(255,255,255,0.3);
        }
        
        .hex-name {
            font-size: 11px;
            font-weight: 600;
            text-transform: lowercase;
            letter-spacing: 0.5px;
        }
        
        .hex-label {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 500;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 1001;
        }
        
        .hex-tile:hover .hex-label {
            opacity: 1;
        }
        
        /* Controls and other styles same as before */
        #controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 1000;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            backdrop-filter: blur(20px);
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-3px);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
        }
        
        #header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 30px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        #header h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }
        
        #header .subtitle {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-top: 4px;
        }
        
        .instagram-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            text-decoration: none;
            background: linear-gradient(135deg, #833ab4, #fd1d1d, #f77737);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            transition: transform 0.2s;
        }
        
        .instagram-link:hover {
            transform: scale(1.05);
        }
        
        #search-container {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 90%;
            max-width: 400px;
        }
        
        #search-input {
            width: 100%;
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
        }
        
        #search-input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        #search-results {
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            border-radius: 15px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }
        
        .search-result-item {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            transition: background 0.2s;
        }
        
        .search-result-item:hover {
            background: rgba(99, 102, 241, 0.3);
        }
        
        #info-panel {
            position: fixed;
            bottom: 100px;
            left: 30px;
            max-width: 300px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            padding: 20px;
            border-radius: 15px;
            color: #fff;
            z-index: 1000;
        }
        
        #info-panel h3 {
            margin-bottom: 10px;
            font-size: 16px;
            color: #a5b4fc;
        }
        
        #info-panel p {
            font-size: 13px;
            line-height: 1.6;
            color: rgba(255,255,255,0.8);
        }
        
        #info-panel .steps {
            margin-top: 15px;
            padding-left: 20px;
        }
        
        #info-panel .steps li {
            margin-bottom: 8px;
            font-size: 12px;
        }
        
        @media (max-width: 768px) {
            #header { padding: 15px 20px; }
            #header h1 { font-size: 18px; }
            .instagram-link { padding: 8px 15px; font-size: 12px; }
            #search-container { top: 80px; width: 85%; }
            #info-panel { display: none; }
            .hex-tile { width: 90px; height: 104px; }
            .btn { padding: 10px 18px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <noscript><div><img src="https://mc.yandex.ru/watch/107200174" style="position:absolute; left:-9999px;" alt="" /></div></noscript>

    <div id="header">
        <div>
            <h1>🍯 TileGrow</h1>
            <div class="subtitle">Interactive Subscriber Map</div>
        </div>
        <a href="https://www.instagram.com/tilegrow" target="_blank" class="instagram-link">
            <span>📷</span> @tilegrow
        </a>
    </div>

    <div id="search-container">
        <input type="text" id="search-input" placeholder="🔍 Find your tile..." autocomplete="off">
        <div id="search-results"></div>
    </div>

    <div id="info-panel">
        <h3>🎯 How to get your tile</h3>
        <p>Join our community and become part of the growing hive!</p>
        <ol class="steps">
            <li>Follow <strong>@tilegrow</strong> on Instagram</li>

        </ol>
    </div>

    <div id="viewport">
        <div id="map-container">
            <div id="hex-grid" class="hex-grid"></div>
        </div>
    </div>

    <div id="controls">
        <button class="btn" onclick="centerOnTile('tilegrow')">⌖ Center</button>
        <button class="btn btn-primary" onclick="startTour()">🎬 Tour</button>
        <button class="btn" onclick="resetZoom()">🔍 Reset</button>
    </div>

    <script>
        // Proper hexagon honeycomb geometry
        const HEX_RADIUS = 60; // Distance from center to corner
        const HEX_WIDTH = HEX_RADIUS * 2; // 120px
        const HEX_HEIGHT = Math.sqrt(3) * HEX_RADIUS; // ~104px vertical
        const HORIZONTAL_SPACING = HEX_RADIUS * 1.5; // Horizontal distance between centers
        const VERTICAL_SPACING = HEX_HEIGHT; // Vertical distance
        
        // Subscribers with unique styles
        const tileStyles = [
            { name: 'tilegrow', ig: 'tilegrow', center: true, bg: 'radial-gradient(circle, #fbbf24 0%, #f59e0b 50%, #d97706 100%)', emoji: '👑' },
            { name: 'alex', ig: 'alex.design', bg: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)', emoji: '🎨' },
            { name: 'maria', ig: 'maria.art', bg: 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)', emoji: '🌸' },
            { name: 'john', ig: 'john.photo', bg: 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)', emoji: '📸' },
            { name: 'anna', ig: 'anna.style', bg: 'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)', emoji: '✨' },
            { name: 'david', ig: 'david.creates', bg: 'linear-gradient(135deg, #fa709a 0%, #fee140 100%)', emoji: '🔥' },
            { name: 'emma', ig: 'emma.visuals', bg: 'linear-gradient(135deg, #30cfd0 0%, #330867 100%)', emoji: '🎭' },
            { name: 'james', ig: 'james.studio', bg: 'linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)', emoji: '🎬' },
            { name: 'sophia', ig: 'sophia.art', bg: 'linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)', emoji: '🦋' },
            { name: 'robert', ig: 'robert.design', bg: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)', emoji: '🎯' },
            { name: 'olivia', ig: 'olivia.creates', bg: 'linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%)', emoji: '💎' },
            { name: 'michael', ig: 'michael.visual', bg: 'linear-gradient(135deg, #f7971e 0%, #ffd200 100%)', emoji: '⚡' },
            { name: 'isabella', ig: 'isabella.art', bg: 'linear-gradient(135deg, #c1dfc4 0%, #deecdd 100%)', emoji: '🌿' },
            { name: 'william', ig: 'william.studio', bg: 'linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%)', emoji: '🎪' },
            { name: 'ava', ig: 'ava.design', bg: 'linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%)', emoji: '🔮' },
            { name: 'richard', ig: 'richard.photo', bg: 'linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)', emoji: '📷' },
            { name: 'mia', ig: 'mia.creates', bg: 'linear-gradient(135deg, #fad0c4 0%, #ffd1ff 100%)', emoji: '🌺' },
            { name: 'joseph', ig: 'joseph.art', bg: 'linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%)', emoji: '🌊' },
            { name: 'charlotte', ig: 'charlotte.style', bg: 'linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%)', emoji: '☁️' },
            { name: 'thomas', ig: 'thomas.visual', bg: 'linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%)', emoji: '🎨' },
            { name: 'amelia', ig: 'amelia.design', bg: 'linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%)', emoji: '🦋' }
        ];

        // Generate hex positions in proper honeycomb layout
        function getHexPosition(index) {
            if (index === 0) return { q: 0, r: 0 };
            
            // Ring-based spiral
            let ring = 1;
            let count = 1;
            while (count + ring * 6 <= index) {
                count += ring * 6;
                ring++;
            }
            
            const posInRing = index - count;
            const sideLength = ring;
            const side = Math.floor(posInRing / sideLength);
            const posOnSide = posInRing % sideLength;
            
            // Start from top and go clockwise
            let q = 0, r = -ring;
            
            // Directions for each side (clockwise from top)
            const directions = [
                { dq: 1, dr: 0 },   // down-right
                { dq: 0, dr: 1 },   // down
                { dq: -1, dr: 1 },  // down-left
                { dq: -1, dr: 0 },  // up-left
                { dq: 0, dr: -1 },  // up
                { dq: 1, dr: -1 }   // up-right
            ];
            
            // Move to start of current side
            for (let s = 0; s < side; s++) {
                for (let i = 0; i < sideLength; i++) {
                    q += directions[s].dq;
                    r += directions[s].dr;
                }
            }
            
            // Move along current side
            for (let i = 0; i < posOnSide; i++) {
                q += directions[side].dq;
                r += directions[side].dr;
            }
            
            return { q, r };
        }

        // Convert axial coordinates to pixel coordinates
        function hexToPixel(q, r) {
            const x = HEX_RADIUS * 1.5 * q;
            const y = HEX_HEIGHT * (r + q * 0.5);
            return { x: x + 800, y: y + 600 }; // Center offset
        }

        // Create hex grid
        const grid = document.getElementById('hex-grid');
        const tileElements = {};
        let isDragging = false;
        let dragStarted = false;
        const dragThreshold = 5;
        let dragStartX = 0, dragStartY = 0;

        tileStyles.forEach((style, index) => {
            const pos = getHexPosition(index);
            const pixel = hexToPixel(pos.q, pos.r);

            const tile = document.createElement('div');
            tile.className = 'hex-tile' + (style.center ? ' center-tile' : '');
            tile.style.left = (pixel.x - HEX_WIDTH/2) + 'px';
            tile.style.top = (pixel.y - HEX_HEIGHT/2) + 'px';
            tile.style.width = HEX_WIDTH + 'px';
            tile.style.height = (HEX_HEIGHT * 1.15) + 'px'; // Slightly taller for pointy hex
            tile.dataset.name = style.name;
            tile.dataset.ig = style.ig;

            tile.innerHTML = `
                <div class="hex-shape" style="background: ${style.bg};">
                    <div class="hex-content">
                        <div class="hex-avatar" style="background: rgba(255,255,255,0.25);">
                            ${style.emoji}
                        </div>
                        <div class="hex-name">${style.name}</div>
                    </div>
                </div>
                <span class="hex-label">@${style.ig}</span>
            `;

            // Drag vs click detection
            tile.addEventListener('mousedown', (e) => {
                dragStarted = false;
                dragStartX = e.clientX;
                dragStartY = e.clientY;
            });

            tile.addEventListener('click', (e) => {
                if (!dragStarted) {
                    window.open(`https://instagram.com/${style.ig}`, '_blank');
                }
            });

            grid.appendChild(tile);
            tileElements[style.name] = tile;
        });

        // Pan & Zoom
        let scale = 1;
        let translateX = 0, translateY = 0;
        let lastX = 0, lastY = 0;

        const container = document.getElementById('map-container');
        const viewport = document.getElementById('viewport');

        function updateTransform() {
            container.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        }

        function centerOnTile(name) {
            const tile = tileElements[name];
            if (!tile) return;
            
            const rect = tile.getBoundingClientRect();
            const viewportRect = viewport.getBoundingClientRect();
            
            translateX = (viewportRect.width / 2) - (rect.left + rect.width / 2 - translateX);
            translateY = (viewportRect.height / 2) - (rect.top + rect.height / 2 - translateY);
            scale = 1.3;
            updateTransform();
        }

        function startTour() {
            centerOnTile('tilegrow');
            let currentScale = 1.3;
            const targetScale = 0.7;
            const duration = 8000; // 8 seconds
            const startTime = performance.now();
            
            function animate(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                currentScale = 1.3 - (0.6 * progress);
                scale = currentScale;
                updateTransform();
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                }
            }
            requestAnimationFrame(animate);
        }

        function resetZoom() {
            scale = 1;
            translateX = 0;
            translateY = 0;
            updateTransform();
        }

        // Mouse events
        viewport.addEventListener('mousedown', e => {
            isDragging = true;
            dragStarted = false;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            lastX = e.clientX;
            lastY = e.clientY;
            viewport.style.cursor = 'grabbing';
        });

        viewport.addEventListener('mousemove', e => {
            if (isDragging) {
                const dx = e.clientX - lastX;
                const dy = e.clientY - lastY;
                
                if (Math.abs(e.clientX - dragStartX) > dragThreshold || 
                    Math.abs(e.clientY - dragStartY) > dragThreshold) {
                    dragStarted = true;
                }
                
                translateX += dx;
                translateY += dy;
                lastX = e.clientX;
                lastY = e.clientY;
                updateTransform();
            }
        });

        viewport.addEventListener('mouseup', () => {
            isDragging = false;
            viewport.style.cursor = 'grab';
        });

        viewport.addEventListener('wheel', e => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            scale = Math.max(0.3, Math.min(4, scale * delta));
            updateTransform();
        });

        // Touch events
        viewport.addEventListener('touchstart', e => {
            if (e.touches.length === 1) {
                isDragging = true;
                dragStarted = false;
                dragStartX = e.touches[0].clientX;
                dragStartY = e.touches[0].clientY;
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
            }
        }, { passive: false });

        viewport.addEventListener('touchmove', e => {
            if (e.touches.length === 1 && isDragging) {
                const dx = e.touches[0].clientX - lastX;
                const dy = e.touches[0].clientY - lastY;
                
                if (Math.abs(e.touches[0].clientX - dragStartX) > dragThreshold || 
                    Math.abs(e.touches[0].clientY - dragStartY) > dragThreshold) {
                    dragStarted = true;
                }
                
                translateX += dx;
                translateY += dy;
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
                updateTransform();
                e.preventDefault();
            }
        }, { passive: false });

        viewport.addEventListener('touchend', () => {
            isDragging = false;
        });

        // Search
        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');

        searchInput.addEventListener('input', e => {
            const query = e.target.value.toLowerCase();
            if (query.length < 2) {
                searchResults.style.display = 'none';
                return;
            }

            const matches = tileStyles.filter(s => 
                s.name.toLowerCase().includes(query) || 
                s.ig.toLowerCase().includes(query)
            );

            searchResults.innerHTML = matches.map(s => `
                <div class="search-result-item" data-name="${s.name}">@${s.ig}</div>
            `).join('');

            searchResults.style.display = matches.length ? 'block' : 'none';

            document.querySelectorAll('.search-result-item').forEach(item => {
                item.addEventListener('click', () => {
                    centerOnTile(item.dataset.name);
                    searchResults.style.display = 'none';
                    searchInput.value = '';
                });
            });
        });

        document.addEventListener('click', e => {
            if (!e.target.closest('#search-container')) {
                searchResults.style.display = 'none';
            }
        });

        // Init
        updateTransform();
        setTimeout(() => centerOnTile('tilegrow'), 100);
    </script>
</body>
