<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TileGrow - Hex Map</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #viewport { 
            width: 100vw; 
            height: 100vh;
            overflow: hidden;
            position: relative;
            cursor: grab;
        }
        #viewport:active { cursor: grabbing; }
        #map-container { 
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: center center;
        }
        
        .hex-tile {
            position: absolute;
            width: 100px;
            height: 115.47px; /* 100 * sqrt(3)/sqrt(3) for pointy hex */
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
            margin-left: -50px;
            margin-top: -57.74px;
        }
        
        .hex-tile:hover {
            transform: scale(1.12);
            filter: drop-shadow(0 8px 20px rgba(255,255,255,0.3));
            z-index: 1000;
        }
        
        .hex-tile.center-tile {
            filter: drop-shadow(0 0 25px rgba(251, 191, 36, 0.7));
            z-index: 100;
        }
        
        .hex-tile.center-tile .hex-content {
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: inset 0 0 20px rgba(255,255,255,0.3); }
            50% { box-shadow: inset 0 0 30px rgba(255,255,255,0.5); }
        }
        
        .hex-shape {
            width: 100%;
            height: 100%;
            background: var(--tile-bg, linear-gradient(135deg, #667eea, #764ba2));
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .hex-content {
            text-align: center;
            color: white;
            z-index: 2;
        }
        
        .hex-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin: 0 auto 4px;
            backdrop-filter: blur(4px);
            border: 2px solid rgba(255,255,255,0.4);
        }
        
        .hex-name {
            font-size: 10px;
            font-weight: 600;
            text-transform: lowercase;
            letter-spacing: 0.3px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        
        .hex-label {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 9px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 1001;
        }
        
        .hex-tile:hover .hex-label {
            opacity: 1;
        }
        
        /* UI Controls */
        #header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 30px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        #header h1 {
            font-size: 22px;
            color: #fff;
            margin: 0;
        }
        
        #header .subtitle {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
        }
        
        .instagram-link {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: #fff;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }
        
        #controls {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 1000;
        }
        
        .btn {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 13px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
        }
        
        .btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
        }
        
        #search-container {
            position: fixed;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 300px;
        }
        
        #search-input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 25px;
            border: none;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        
        #search-results {
            position: absolute;
            top: 50px;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            border-radius: 12px;
            max-height: 250px;
            overflow-y: auto;
            display: none;
        }
        
        .search-result-item {
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-size: 13px;
        }
        
        .search-result-item:hover {
            background: rgba(99, 102, 241, 0.3);
        }
        
        #info-panel {
            position: fixed;
            bottom: 90px;
            left: 20px;
            width: 260px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
            padding: 18px;
            border-radius: 16px;
            color: #fff;
            z-index: 1000;
        }
        
        #info-panel h3 {
            font-size: 14px;
            margin-bottom: 8px;
            color: #a5b4fc;
        }
        
        #info-panel p, #info-panel li {
            font-size: 12px;
            line-height: 1.5;
            color: rgba(255,255,255,0.8);
        }
        
        #info-panel ol {
            padding-left: 18px;
            margin-top: 10px;
        }
        
        #info-panel li {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <script>
        // Yandex Metrika
        (function(m,e,t,r,i,k,a){m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};m[i].l=1*new Date();k=e.createElement(t),a=e.getElementsByTagName(t)[0];k.async=1;k.src=r;a.parentNode.insertBefore(k,a)})(window,document,'script','https://mc.yandex.ru/metrika/tag.js','ym');ym(107200174,'init',{clickmap:true,trackLinks:true,accurateTrackBounce:true,webvisor:true});
    </script>

    <div id="header">
        <div>
            <h1>🍯 TileGrow</h1>
            <div class="subtitle">Find your place in the hive</div>
        </div>
        <a href="https://instagram.com/tilegrow" target="_blank" class="instagram-link">📷 @tilegrow</a>
    </div>

    <div id="search-container">
        <input type="text" id="search-input" placeholder="Find your tile...">
        <div id="search-results"></div>
    </div>

    <div id="info-panel">
        <h3>🎯 How to get your tile</h3>
        <p>Join our community and become part of the growing hive!</p>
        <ol>
            <li>Follow <strong>@tilegrow</strong> on Instagram</li>
            <li>Like & comment on our posts</li>
            <li>Get featured on the map!</li>
        </ol>
    </div>

    <div id="viewport">
        <div id="map-container"></div>
    </div>

    <div id="controls">
        <button class="btn" onclick="centerOnTile(0)">⌖ Center</button>
        <button class="btn btn-primary" onclick="startTour()">🎬 Tour</button>
        <button class="btn" onclick="resetView()">⟲ Reset</button>
    </div>

    <script>
        // Hexagon math - pointy-top hexagons
        const HEX_SIZE = 50; // radius (center to corner)
        const HEX_WIDTH = HEX_SIZE * 2;
        const HEX_HEIGHT = Math.sqrt(3) * HEX_SIZE;
        const HEX_HORIZ = HEX_SIZE * 1.5; // horizontal distance between centers
        const HEX_VERT = HEX_HEIGHT; // vertical distance

        // Tile data with unique gradients
        const tiles = [
            { name: 'tilegrow', ig: 'tilegrow', center: true, bg: 'linear-gradient(135deg, #fbbf24, #f59e0b)', icon: '👑' },
            { name: 'alex', ig: 'alex.design', bg: 'linear-gradient(135deg, #667eea, #764ba2)', icon: '🎨' },
            { name: 'maria', ig: 'maria.art', bg: 'linear-gradient(135deg, #f093fb, #f5576c)', icon: '🌸' },
            { name: 'john', ig: 'john.photo', bg: 'linear-gradient(135deg, #4facfe, #00f2fe)', icon: '📸' },
            { name: 'anna', ig: 'anna.style', bg: 'linear-gradient(135deg, #43e97b, #38f9d7)', icon: '✨' },
            { name: 'david', ig: 'david.creates', bg: 'linear-gradient(135deg, #fa709a, #fee140)', icon: '🔥' },
            { name: 'emma', ig: 'emma.visuals', bg: 'linear-gradient(135deg, #30cfd0, #330867)', icon: '🎭' },
            { name: 'james', ig: 'james.studio', bg: 'linear-gradient(135deg, #a8edea, #fed6e3)', icon: '🎬' },
            { name: 'sophia', ig: 'sophia.art', bg: 'linear-gradient(135deg, #ff9a9e, #fecfef)', icon: '🦋' },
            { name: 'robert', ig: 'robert.design', bg: 'linear-gradient(135deg, #667eea, #764ba2)', icon: '🎯' },
            { name: 'olivia', ig: 'olivia.creates', bg: 'linear-gradient(135deg, #89f7fe, #66a6ff)', icon: '💎' },
            { name: 'michael', ig: 'michael.visual', bg: 'linear-gradient(135deg, #f7971e, #ffd200)', icon: '⚡' },
            { name: 'isabella', ig: 'isabella.art', bg: 'linear-gradient(135deg, #c1dfc4, #deecdd)', icon: '🌿' },
            { name: 'william', ig: 'william.studio', bg: 'linear-gradient(135deg, #ffecd2, #fcb69f)', icon: '🎪' },
            { name: 'ava', ig: 'ava.design', bg: 'linear-gradient(135deg, #e0c3fc, #8ec5fc)', icon: '🔮' },
            { name: 'richard', ig: 'richard.photo', bg: 'linear-gradient(135deg, #a18cd1, #fbc2eb)', icon: '📷' },
            { name: 'mia', ig: 'mia.creates', bg: 'linear-gradient(135deg, #fad0c4, #ffd1ff)', icon: '🌺' },
            { name: 'joseph', ig: 'joseph.art', bg: 'linear-gradient(135deg, #84fab0, #8fd3f4)', icon: '🌊' },
            { name: 'charlotte', ig: 'charlotte.style', bg: 'linear-gradient(135deg, #a1c4fd, #c2e9fb)', icon: '☁️' },
            { name: 'thomas', ig: 'thomas.visual', bg: 'linear-gradient(135deg, #ffecd2, #fcb69f)', icon: '🎨' },
            { name: 'amelia', ig: 'amelia.design', bg: 'linear-gradient(135deg, #fbc2eb, #a6c1ee)', icon: '🦋' }
        ];

        // Convert axial coordinates to pixel coordinates for pointy-top hexes
        function hexToPixel(q, r) {
            const x = HEX_SIZE * (Math.sqrt(3) * q + Math.sqrt(3)/2 * r);
            const y = HEX_SIZE * (3/2 * r);
            return { x, y };
        }

        // Get ring and position in ring for spiral layout
        function getSpiralPosition(index) {
            if (index === 0) return { q: 0, r: 0 };
            
            let ring = 1;
            let count = 1;
            while (count + ring * 6 <= index) {
                count += ring * 6;
                ring++;
            }
            
            const posInRing = index - count;
            const sideLength = ring;
            const side = Math.floor(posInRing / sideLength);
            const posOnSide = posInRing % sideLength;
            
            // Directions for each side (counter-clockwise from top-right)
            const directions = [
                { dq: 1, dr: -1 },  // top-right
                { dq: 1, dr: 0 },   // right
                { dq: 0, dr: 1 },   // bottom-right
                { dq: -1, dr: 1 },  // bottom-left
                { dq: -1, dr: 0 },  // left
                { dq: 0, dr: -1 }   // top-left
            ];
            
            // Start from top of ring
            let q = 0, r = -ring;
            
            // Move along sides
            for (let s = 0; s < side; s++) {
                for (let i = 0; i < sideLength; i++) {
                    q += directions[s].dq;
                    r += directions[s].dr;
                }
            }
            
            for (let i = 0; i < posOnSide; i++) {
                q += directions[side].dq;
                r += directions[side].dr;
            }
            
            return { q, r };
        }

        // Create tiles
        const container = document.getElementById('map-container');
        const tileElements = [];

        tiles.forEach((tile, index) => {
            const pos = getSpiralPosition(index);
            const pixel = hexToPixel(pos.q, pos.r);
            
            const el = document.createElement('div');
            el.className = 'hex-tile' + (tile.center ? ' center-tile' : '');
            el.style.left = pixel.x + 'px';
            el.style.top = pixel.y + 'px';
            el.style.setProperty('--tile-bg', tile.bg);
            el.innerHTML = `
                <div class="hex-shape">
                    <div class="hex-content">
                        <div class="hex-avatar">${tile.icon}</div>
                        <div class="hex-name">${tile.name}</div>
                    </div>
                </div>
                <span class="hex-label">@${tile.ig}</span>
            `;
            
            // Click handling with drag detection
            let isDraggingTile = false;
            let startX, startY;
            
            el.addEventListener('mousedown', (e) => {
                isDraggingTile = false;
                startX = e.clientX;
                startY = e.clientY;
            });
            
            el.addEventListener('mousemove', (e) => {
                if (Math.abs(e.clientX - startX) > 3 || Math.abs(e.clientY - startY) > 3) {
                    isDraggingTile = true;
                }
            });
            
            el.addEventListener('click', (e) => {
                if (!isDraggingTile) {
                    window.open(`https://instagram.com/${tile.ig}`, '_blank');
                }
            });
            
            container.appendChild(el);
            tileElements.push(el);
        });

        // Pan and zoom
        let scale = 1;
        let translateX = 0, translateY = 0;
        let isDragging = false;
        let startDragX, startDragY;

        const viewport = document.getElementById('viewport');

        function updateTransform() {
            container.style.transform = `translate(calc(-50% + ${translateX}px), calc(-50% + ${translateY}px)) scale(${scale})`;
        }

        function centerOnTile(index) {
            const tile = tiles[index];
            const pos = getSpiralPosition(index);
            const pixel = hexToPixel(pos.q, pos.r);
            translateX = -pixel.x;
            translateY = -pixel.y;
            scale = 1.5;
            updateTransform();
        }

        function startTour() {
            centerOnTile(0);
            const startScale = 1.5;
            const endScale = 0.6;
            const duration = 6000;
            const startTime = Date.now();
            
            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                scale = startScale - (startScale - endScale) * progress;
                updateTransform();
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                }
            }
            animate();
        }

        function resetView() {
            scale = 1;
            translateX = 0;
            translateY = 0;
            updateTransform();
        }

        // Mouse events
        viewport.addEventListener('mousedown', (e) => {
            isDragging = true;
            startDragX = e.clientX - translateX;
            startDragY = e.clientY - translateY;
            viewport.style.cursor = 'grabbing';
        });

        viewport.addEventListener('mousemove', (e) => {
            if (isDragging) {
                translateX = e.clientX - startDragX;
                translateY = e.clientY - startDragY;
                updateTransform();
            }
        });

        viewport.addEventListener('mouseup', () => {
            isDragging = false;
            viewport.style.cursor = 'grab';
        });

        viewport.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            scale = Math.max(0.3, Math.min(4, scale * delta));
            updateTransform();
        });

        // Touch events
        viewport.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true;
                startDragX = e.touches[0].clientX - translateX;
                startDragY = e.touches[0].clientY - translateY;
            }
        }, { passive: false });

        viewport.addEventListener('touchmove', (e) => {
            if (isDragging && e.touches.length === 1) {
                translateX = e.touches[0].clientX - startDragX;
                translateY = e.touches[0].clientY - startDragY;
                updateTransform();
                e.preventDefault();
            }
        }, { passive: false });

        viewport.addEventListener('touchend', () => {
            isDragging = false;
        });

        // Search functionality
        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            if (query.length < 2) {
                searchResults.style.display = 'none';
                return;
            }

            const matches = tiles.map((t, i) => ({ ...t, index: i })).filter(t => 
                t.name.toLowerCase().includes(query) || t.ig.toLowerCase().includes(query)
            );

            searchResults.innerHTML = matches.map(t => `
                <div class="search-result-item" data-index="${t.index}">@${t.ig}</div>
            `).join('');

            searchResults.style.display = matches.length ? 'block' : 'none';

            document.querySelectorAll('.search-result-item').forEach(item => {
                item.addEventListener('click', () => {
                    centerOnTile(parseInt(item.dataset.index));
                    searchResults.style.display = 'none';
                    searchInput.value = '';
                });
            });
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('#search-container')) {
                searchResults.style.display = 'none';
            }
        });

        // Initialize
        updateTransform();
        centerOnTile(0);
    </script>
</body>
