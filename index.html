<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TileGrow - Hex Map</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%); 
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #viewport { 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            position: relative; 
            cursor: grab; 
        }
        #viewport:active { cursor: grabbing; }
        #map-container { 
            position: absolute; 
            transform-origin: center center; 
            will-change: transform;
        }
        
        .hex-grid {
            position: relative;
            width: 2000px;
            height: 2000px;
        }
        
        .hex-tile {
            position: absolute;
            width: 120px;
            height: 138px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }
        
        .hex-tile:hover {
            transform: scale(1.15);
            filter: drop-shadow(0 8px 20px rgba(99, 102, 241, 0.6));
            z-index: 1000;
        }
        
        .hex-tile.center-tile {
            filter: drop-shadow(0 0 30px rgba(251, 191, 36, 0.8));
            animation: pulse-center 2s ease-in-out infinite;
        }
        
        .hex-tile.center-tile:hover {
            filter: drop-shadow(0 0 40px rgba(251, 191, 36, 1));
        }
        
        @keyframes pulse-center {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .hex-shape {
            width: 100%;
            height: 100%;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .hex-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0.9;
        }
        
        .hex-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.2), rgba(0,0,0,0.5));
        }
        
        .hex-content {
            position: relative;
            z-index: 10;
            text-align: center;
            color: white;
        }
        
        .hex-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            margin: 0 auto 5px;
            border: 2px solid rgba(255,255,255,0.3);
        }
        
        .hex-name {
            font-size: 11px;
            font-weight: 600;
            text-transform: lowercase;
            letter-spacing: 0.5px;
        }
        
        .hex-label {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 500;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 1001;
        }
        
        .hex-tile:hover .hex-label {
            opacity: 1;
        }
        
        /* Controls */
        #controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 1000;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            backdrop-filter: blur(20px);
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
        }
        
        /* Header */
        #header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 30px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        #header h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }
        
        #header .subtitle {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-top: 4px;
        }
        
        .instagram-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            text-decoration: none;
            background: linear-gradient(135deg, #833ab4, #fd1d1d, #f77737);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            transition: transform 0.2s;
        }
        
        .instagram-link:hover {
            transform: scale(1.05);
        }
        
        /* Search */
        #search-container {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 90%;
            max-width: 400px;
        }
        
        #search-input {
            width: 100%;
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
        }
        
        #search-input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        #search-input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }
        
        #search-results {
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            border-radius: 15px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }
        
        .search-result-item {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            transition: background 0.2s;
        }
        
        .search-result-item:hover {
            background: rgba(99, 102, 241, 0.3);
        }
        
        .search-result-item:last-child {
            border-bottom: none;
        }
        
        /* Info panel */
        #info-panel {
            position: fixed;
            bottom: 100px;
            left: 30px;
            max-width: 300px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            padding: 20px;
            border-radius: 15px;
            color: #fff;
            z-index: 1000;
        }
        
        #info-panel h3 {
            margin-bottom: 10px;
            font-size: 16px;
            color: #a5b4fc;
        }
        
        #info-panel p {
            font-size: 13px;
            line-height: 1.6;
            color: rgba(255,255,255,0.8);
        }
        
        #info-panel .steps {
            margin-top: 15px;
            padding-left: 20px;
        }
        
        #info-panel .steps li {
            margin-bottom: 8px;
            font-size: 12px;
        }
        
        /* Mobile adjustments */
        @media (max-width: 768px) {
            #header {
                padding: 15px 20px;
            }
            
            #header h1 {
                font-size: 18px;
            }
            
            .instagram-link {
                padding: 8px 15px;
                font-size: 12px;
            }
            
            #search-container {
                top: 80px;
                width: 85%;
            }
            
            #info-panel {
                display: none;
            }
            
            .hex-tile {
                width: 90px;
                height: 104px;
            }
            
            .btn {
                padding: 10px 18px;
                font-size: 12px;
            }
        }
    </style>
</head>

    <script>
        // Hexagon geometry - tighter packing
        const HEX_WIDTH = 100;
        const HEX_HEIGHT = 115;
        const HEX_HORIZ = HEX_WIDTH * 0.866; // cos(30°)
        const HEX_VERT = HEX_HEIGHT * 0.75;

        // Subscribers data - spiral order from center
        const subscribers = [
            { name: 'tilegrow', ig: 'tilegrow', center: true, color: '#fbbf24', pattern: 'radial' },
            { name: 'alex', ig: 'alex.design', color: '#667eea', pattern: 'diagonal' },
            { name: 'maria', ig: 'maria.art', color: '#f093fb', pattern: 'dots' },
            { name: 'john', ig: 'john.photo', color: '#4facfe', pattern: 'waves' },
            { name: 'anna', ig: 'anna.style', color: '#43e97b', pattern: 'grid' },
            { name: 'david', ig: 'david.creates', color: '#fa709a', pattern: 'zigzag' },
            { name: 'emma', ig: 'emma.visuals', color: '#30cfd0', pattern: 'circles' },
            { name: 'james', ig: 'james.studio', color: '#a8edea', pattern: 'lines' },
            { name: 'sophia', ig: 'sophia.art', color: '#fed6e3', pattern: 'stars' },
            { name: 'robert', ig: 'robert.design', color: '#d299c2', pattern: 'hex' },
            { name: 'olivia', ig: 'olivia.creates', color: '#89f7fe', pattern: 'triangles' },
            { name: 'michael', ig: 'michael.visual', color: '#f5f7fa', pattern: 'cross' },
            { name: 'isabella', ig: 'isabella.art', color: '#c1dfc4', pattern: 'diamond' },
            { name: 'william', ig: 'william.studio', color: '#deecdd', pattern: 'spiral' },
            { name: 'ava', ig: 'ava.design', color: '#e0c3fc', pattern: 'waves2' },
            { name: 'richard', ig: 'richard.photo', color: '#8ec5fc', pattern: 'dots2' },
            { name: 'mia', ig: 'mia.creates', color: '#ffecd2', pattern: 'sun' },
            { name: 'joseph', ig: 'joseph.art', color: '#fcb69f', pattern: 'moon' },
            { name: 'charlotte', ig: 'charlotte.style', color: '#a1c4fd', pattern: 'cloud' },
            { name: 'thomas', ig: 'thomas.visual', color: '#c2e9fb', pattern: 'rain' },
            { name: 'amelia', ig: 'amelia.design', color: '#fbc2eb', pattern: 'snow' }
        ];

        // Generate unique SVG patterns for each tile
        function generatePattern(pattern, color) {
            const patterns = {
                radial: `<radialGradient id="g"><stop offset="0%" stop-color="${color}"/><stop offset="100%" stop-color="${color}44"/></radialGradient><rect fill="url(#g)" width="100" height="100"/>`,
                diagonal: `<pattern id="p" patternUnits="userSpaceOnUse" width="20" height="20"><path d="M0,20 L20,0" stroke="${color}" stroke-width="2" opacity="0.3"/></pattern><rect fill="${color}" width="100" height="100"/><rect fill="url(#p)" width="100" height="100"/>`,
                dots: `<rect fill="${color}" width="100" height="100"/><circle cx="25" cy="25" r="8" fill="white" opacity="0.3"/><circle cx="75" cy="25" r="8" fill="white" opacity="0.3"/><circle cx="50" cy="50" r="8" fill="white" opacity="0.3"/><circle cx="25" cy="75" r="8" fill="white" opacity="0.3"/><circle cx="75" cy="75" r="8" fill="white" opacity="0.3"/>`,
                waves: `<rect fill="${color}" width="100" height="100"/><path d="M0,30 Q25,10 50,30 T100,30" stroke="white" stroke-width="3" fill="none" opacity="0.3"/><path d="M0,60 Q25,40 50,60 T100,60" stroke="white" stroke-width="3" fill="none" opacity="0.3"/><path d="M0,90 Q25,70 50,90 T100,90" stroke="white" stroke-width="3" fill="none" opacity="0.3"/>`,
                grid: `<rect fill="${color}" width="100" height="100"/><path d="M33,0 L33,100 M66,0 L66,100 M0,33 L100,33 M0,66 L100,66" stroke="white" stroke-width="2" opacity="0.2"/>`,
                zigzag: `<rect fill="${color}" width="100" height="100"/><path d="M0,20 L20,0 L40,20 L60,0 L80,20 L100,0" stroke="white" stroke-width="3" fill="none" opacity="0.3"/><path d="M0,50 L20,30 L40,50 L60,30 L80,50 L100,30" stroke="white" stroke-width="3" fill="none" opacity="0.3"/><path d="M0,80 L20,60 L40,80 L60,60 L80,80 L100,60" stroke="white" stroke-width="3" fill="none" opacity="0.3"/>`,
                circles: `<rect fill="${color}" width="100" height="100"/><circle cx="50" cy="50" r="30" stroke="white" stroke-width="3" fill="none" opacity="0.3"/><circle cx="50" cy="50" r="15" fill="white" opacity="0.3"/>`,
                lines: `<rect fill="${color}" width="100" height="100"/><line x1="0" y1="20" x2="100" y2="20" stroke="white" stroke-width="2" opacity="0.3"/><line x1="0" y1="40" x2="100" y2="40" stroke="white" stroke-width="2" opacity="0.3"/><line x1="0" y1="60" x2="100" y2="60" stroke="white" stroke-width="2" opacity="0.3"/><line x1="0" y1="80" x2="100" y2="80" stroke="white" stroke-width="2" opacity="0.3"/>`,
                stars: `<rect fill="${color}" width="100" height="100"/><text x="20" y="30" font-size="20" fill="white" opacity="0.4">★</text><text x="60" y="50" font-size="20" fill="white" opacity="0.4">★</text><text x="30" y="80" font-size="20" fill="white" opacity="0.4">★</text><text x="70" y="90" font-size="20" fill="white" opacity="0.4">★</text>`,
                hex: `<rect fill="${color}" width="100" height="100"/><path d="M50,15 L85,32.5 L85,67.5 L50,85 L15,67.5 L15,32.5 Z" stroke="white" stroke-width="2" fill="none" opacity="0.3"/>`,
                triangles: `<rect fill="${color}" width="100" height="100"/><path d="M50,15 L85,75 L15,75 Z" stroke="white" stroke-width="2" fill="none" opacity="0.3"/><path d="M50,85 L15,25 L85,25 Z" stroke="white" stroke-width="2" fill="none" opacity="0.3"/>`,
                cross: `<rect fill="${color}" width="100" height="100"/><path d="M50,15 L50,85 M15,50 L85,50" stroke="white" stroke-width="4" opacity="0.3"/>`,
                diamond: `<rect fill="${color}" width="100" height="100"/><path d="M50,10 L90,50 L50,90 L10,50 Z" stroke="white" stroke-width="2" fill="none" opacity="0.3"/>`,
                spiral: `<rect fill="${color}" width="100" height="100"/><path d="M50,50 m-40,0 a40,40 0 1,0 80,0 a40,40 0 1,0 -80,0 M50,50 m-25,0 a25,25 0 1,0 50,0 a25,25 0 1,0 -50,0 M50,50 m-10,0 a10,10 0 1,0 20,0 a10,10 0 1,0 -20,0" stroke="white" stroke-width="2" fill="none" opacity="0.3"/>`,
                waves2: `<rect fill="${color}" width="100" height="100"/><path d="M0,25 Q12.5,15 25,25 T50,25 T75,25 T100,25" stroke="white" stroke-width="2" fill="none" opacity="0.3"/><path d="M0,50 Q12.5,40 25,50 T50,50 T75,50 T100,50" stroke="white" stroke-width="2" fill="none" opacity="0.3"/><path d="M0,75 Q12.5,65 25,75 T50,75 T75,75 T100,75" stroke="white" stroke-width="2" fill="none" opacity="0.3"/>`,
                dots2: `<rect fill="${color}" width="100" height="100"/><circle cx="20" cy="20" r="5" fill="white" opacity="0.4"/><circle cx="50" cy="20" r="5" fill="white" opacity="0.4"/><circle cx="80" cy="20" r="5" fill="white" opacity="0.4"/><circle cx="35" cy="50" r="5" fill="white" opacity="0.4"/><circle cx="65" cy="50" r="5" fill="white" opacity="0.4"/><circle cx="20" cy="80" r="5" fill="white" opacity="0.4"/><circle cx="50" cy="80" r="5" fill="white" opacity="0.4"/><circle cx="80" cy="80" r="5" fill="white" opacity="0.4"/>`,
                sun: `<rect fill="${color}" width="100" height="100"/><circle cx="50" cy="50" r="20" fill="#fbbf24" opacity="0.8"/><line x1="50" y1="10" x2="50" y2="25" stroke="#fbbf24" stroke-width="3" opacity="0.6"/><line x1="50" y1="75" x2="50" y2="90" stroke="#fbbf24" stroke-width="3" opacity="0.6"/><line x1="10" y1="50" x2="25" y2="50" stroke="#fbbf24" stroke-width="3" opacity="0.6"/><line x1="75" y1="50" x2="90" y2="50" stroke="#fbbf24" stroke-width="3" opacity="0.6"/>`,
                moon: `<rect fill="${color}" width="100" height="100"/><path d="M35,20 A30,30 0 1,1 35,80 A20,20 0 1,0 35,20" fill="#e0e7ff" opacity="0.8"/>`,
                cloud: `<rect fill="${color}" width="100" height="100"/><ellipse cx="35" cy="55" rx="20" ry="15" fill="white" opacity="0.7"/><ellipse cx="55" cy="50" rx="25" ry="18" fill="white" opacity="0.7"/><ellipse cx="75" cy="55" rx="20" ry="15" fill="white" opacity="0.7"/>`,
                rain: `<rect fill="${color}" width="100" height="100"/><line x1="30" y1="40" x2="25" y2="60" stroke="#60a5fa" stroke-width="2" opacity="0.6"/><line x1="50" y1="35" x2="45" y2="55" stroke="#60a5fa" stroke-width="2" opacity="0.6"/><line x1="70" y1="40" x2="65" y2="60" stroke="#60a5fa" stroke-width="2" opacity="0.6"/>`,
                snow: `<rect fill="${color}" width="100" height="100"/><text x="30" y="40" font-size="20" fill="white" opacity="0.8">❄</text><text x="55" y="60" font-size="20" fill="white" opacity="0.8">❄</text><text x="40" y="80" font-size="20" fill="white" opacity="0.8">❄</text>`
            };
            return patterns[pattern] || patterns.radial;
        }

        // Calculate hex positions in spiral
        function getHexPosition(index) {
            if (index === 0) return { x: 0, y: 0 };
            
            let ring = 1;
            let count = 1;
            while (count + ring * 6 <= index) {
                count += ring * 6;
                ring++;
            }
            
            const posInRing = index - count;
            const side = Math.floor(posInRing / ring);
            const posOnSide = posInRing % ring;
            
            const directions = [
                { x: 1, y: -1 }, { x: 1, y: 0 }, { x: 0, y: 1 },
                { x: -1, y: 1 }, { x: -1, y: 0 }, { x: 0, y: -1 }
            ];
            
            let x = ring * directions[(side + 4) % 6].x;
            let y = ring * directions[(side + 4) % 6].y;
            
            for (let i = 0; i < posOnSide; i++) {
                x += directions[side].x;
                y += directions[side].y;
            }
            
            return { x, y };
        }

        // Create hex grid
        const grid = document.getElementById('hex-grid');
        const tileElements = {};
        let isDragging = false;
        let dragStarted = false;
        let dragThreshold = 5;
        let dragStartX = 0;
        let dragStartY = 0;

        subscribers.forEach((sub, index) => {
            const pos = getHexPosition(index);
            const x = pos.x * HEX_HORIZ + 500;
            const y = pos.y * HEX_VERT + (Math.abs(pos.x) % 2) * (HEX_VERT * 0.5) + 400;

            const tile = document.createElement('div');
            tile.className = 'hex-tile' + (sub.center ? ' center-tile' : '');
            tile.style.left = x + 'px';
            tile.style.top = y + 'px';
            tile.dataset.name = sub.name;
            tile.dataset.ig = sub.ig;
            tile.dataset.index = index;

            const patternSvg = generatePattern(sub.pattern, sub.color);
            
            tile.innerHTML = `
                <div class="hex-shape" style="background: ${sub.color};">
                    <svg class="hex-bg" viewBox="0 0 100 100" preserveAspectRatio="none">
                        ${patternSvg}
                    </svg>
                    <div class="hex-overlay"></div>
                    <div class="hex-content">
                        <div class="hex-avatar" style="background: ${sub.center ? '#fbbf24' : 'rgba(255,255,255,0.2)'};">
                            ${sub.name[0].toUpperCase()}
                        </div>
                        <div class="hex-name">${sub.name}</div>
                    </div>
                </div>
                <span class="hex-label">@${sub.ig}</span>
            `;

            // Click handler with drag detection
            tile.addEventListener('mousedown', (e) => {
                dragStarted = false;
                dragStartX = e.clientX;
                dragStartY = e.clientY;
            });

            tile.addEventListener('click', (e) => {
                if (!dragStarted) {
                    window.open(`https://instagram.com/${sub.ig}`, '_blank');
                }
            });

            grid.appendChild(tile);
            tileElements[sub.name] = tile;
        });

        // Pan & Zoom
        let scale = 1;
        let translateX = 0;
        let translateY = 0;
        let lastX = 0;
        let lastY = 0;

        const container = document.getElementById('map-container');
        const viewport = document.getElementById('viewport');

        function updateTransform() {
            container.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        }

        function centerOnTile(name) {
            const tile = tileElements[name];
            if (!tile) return;
            
            const rect = tile.getBoundingClientRect();
            const viewportRect = viewport.getBoundingClientRect();
            
            translateX = (viewportRect.width / 2) - (rect.left + rect.width / 2 - translateX);
            translateY = (viewportRect.height / 2) - (rect.top + rect.height / 2 - translateY);
            scale = 1.5;
            updateTransform();
        }

        function startTour() {
            // Start zoomed in on center
            centerOnTile('tilegrow');
            
            // Then slowly zoom out to show all
            let currentScale = 1.5;
            const targetScale = 0.6;
            const steps = 120; // 2 seconds at 60fps
            const stepSize = (currentScale - targetScale) / steps;
            
            let step = 0;
            function animate() {
                if (step < steps) {
                    currentScale -= stepSize;
                    scale = currentScale;
                    updateTransform();
                    step++;
                    requestAnimationFrame(animate);
                }
            }
            animate();
        }

        function resetZoom() {
            scale = 1;
            translateX = 0;
            translateY = 0;
            updateTransform();
        }

        // Event listeners with drag detection
        viewport.addEventListener('mousedown', e => {
            isDragging = true;
            dragStarted = false;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            lastX = e.clientX;
            lastY = e.clientY;
            viewport.style.cursor = 'grabbing';
        });

        viewport.addEventListener('mousemove', e => {
            if (isDragging) {
                const dx = e.clientX - lastX;
                const dy = e.clientY - lastY;
                
                // Check if moved beyond threshold
                if (Math.abs(e.clientX - dragStartX) > dragThreshold || 
                    Math.abs(e.clientY - dragStartY) > dragThreshold) {
                    dragStarted = true;
                }
                
                translateX += dx;
                translateY += dy;
                lastX = e.clientX;
                lastY = e.clientY;
                updateTransform();
            }
        });

        viewport.addEventListener('mouseup', () => {
            isDragging = false;
            viewport.style.cursor = 'grab';
        });

        viewport.addEventListener('wheel', e => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            scale = Math.max(0.3, Math.min(4, scale * delta));
            updateTransform();
        });

        // Touch support
        viewport.addEventListener('touchstart', e => {
            if (e.touches.length === 1) {
                isDragging = true;
                dragStarted = false;
                dragStartX = e.touches[0].clientX;
                dragStartY = e.touches[0].clientY;
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
            }
        }, { passive: false });

        viewport.addEventListener('touchmove', e => {
            if (e.touches.length === 1 && isDragging) {
                const dx = e.touches[0].clientX - lastX;
                const dy = e.touches[0].clientY - lastY;
                
                if (Math.abs(e.touches[0].clientX - dragStartX) > dragThreshold || 
                    Math.abs(e.touches[0].clientY - dragStartY) > dragThreshold) {
                    dragStarted = true;
                }
                
                translateX += dx;
                translateY += dy;
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
                updateTransform();
                e.preventDefault();
            }
        }, { passive: false });

        viewport.addEventListener('touchend', () => {
            isDragging = false;
        });

        // Search functionality
        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');

        searchInput.addEventListener('input', e => {
            const query = e.target.value.toLowerCase();
            if (query.length < 2) {
                searchResults.style.display = 'none';
                return;
            }

            const matches = subscribers.filter(s => 
                s.name.toLowerCase().includes(query) || 
                s.ig.toLowerCase().includes(query)
            );

            searchResults.innerHTML = matches.map(s => `
                <div class="search-result-item" data-name="${s.name}">
                    @${s.ig}
                </div>
            `).join('');

            searchResults.style.display = matches.length ? 'block' : 'none';

            document.querySelectorAll('.search-result-item').forEach(item => {
                item.addEventListener('click', () => {
                    centerOnTile(item.dataset.name);
                    searchResults.style.display = 'none';
                    searchInput.value = '';
                });
            });
        });

        // Close search on click outside
        document.addEventListener('click', e => {
            if (!e.target.closest('#search-container')) {
                searchResults.style.display = 'none';
            }
        });

        // Initialize
        updateTransform();
        
        // Auto-center on load
        setTimeout(() => {
            centerOnTile('tilegrow');
        }, 100);
    </script>
</body>
</html>
