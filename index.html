<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TileGrow - Hex Map</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); 
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #viewport { 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            position: relative; 
            cursor: grab; 
        }
        #viewport:active { cursor: grabbing; }
        #map-container { 
            position: absolute; 
            transform-origin: center center; 
            transition: transform 0.1s ease-out; 
        }
        
        /* Hexagon grid */
        .hex-grid {
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        .hex-tile {
            position: absolute;
            width: 140px;
            height: 160px;
            cursor: pointer;
            transition: all 0.3s ease;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }
        
        .hex-tile:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 8px 20px rgba(99, 102, 241, 0.5));
            z-index: 100;
        }
        
        .hex-tile.center-tile {
            filter: drop-shadow(0 0 20px rgba(251, 191, 36, 0.6));
            animation: pulse-gold 2s ease-in-out infinite;
        }
        
        @keyframes pulse-gold {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(251, 191, 36, 0.6)); }
            50% { filter: drop-shadow(0 0 30px rgba(251, 191, 36, 0.9)); }
        }
        
        .hex-shape {
            width: 100%;
            height: 100%;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            overflow: hidden;
            position: relative;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .hex-shape img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        .hex-label {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        
        .hex-tile:hover .hex-label {
            opacity: 1;
        }
        
        /* Controls */
        #controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 1000;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            backdrop-filter: blur(20px);
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
        }
        
        /* Header */
        #header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 30px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        #header h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }
        
        #header .subtitle {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-top: 4px;
        }
        
        .instagram-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            text-decoration: none;
            background: linear-gradient(135deg, #833ab4, #fd1d1d, #f77737);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            transition: transform 0.2s;
        }
        
        .instagram-link:hover {
            transform: scale(1.05);
        }
        
        /* Search */
        #search-container {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 90%;
            max-width: 400px;
        }
        
        #search-input {
            width: 100%;
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
        }
        
        #search-input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        #search-input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }
        
        #search-results {
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            border-radius: 15px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }
        
        .search-result-item {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            transition: background 0.2s;
        }
        
        .search-result-item:hover {
            background: rgba(99, 102, 241, 0.3);
        }
        
        .search-result-item:last-child {
            border-bottom: none;
        }
        
        /* Info panel */
        #info-panel {
            position: fixed;
            bottom: 100px;
            left: 30px;
            max-width: 300px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            padding: 20px;
            border-radius: 15px;
            color: #fff;
            z-index: 1000;
        }
        
        #info-panel h3 {
            margin-bottom: 10px;
            font-size: 16px;
            color: #a5b4fc;
        }
        
        #info-panel p {
            font-size: 13px;
            line-height: 1.6;
            color: rgba(255,255,255,0.8);
        }
        
        #info-panel .steps {
            margin-top: 15px;
            padding-left: 20px;
        }
        
        #info-panel .steps li {
            margin-bottom: 8px;
            font-size: 12px;
        }
        
        /* Mobile adjustments */
        @media (max-width: 768px) {
            #header {
                padding: 15px 20px;
            }
            
            #header h1 {
                font-size: 18px;
            }
            
            .instagram-link {
                padding: 8px 15px;
                font-size: 12px;
            }
            
            #search-container {
                top: 80px;
                width: 85%;
            }
            
            #info-panel {
                display: none;
            }
            
            .hex-tile {
                width: 100px;
                height: 115px;
            }
            
            .btn {
                padding: 10px 18px;
                font-size: 12px;
            }
        }
    </style>
</head>

    <div id="header">
        <div>
            <h1>🍯 TileGrow</h1>
            <div class="subtitle">Interactive Subscriber Map</div>
        </div>
        <a href="https://www.instagram.com/tilegrow" target="_blank" class="instagram-link">
            <span>📷</span> @tilegrow
        </a>
    </div>

    <div id="search-container">
        <input type="text" id="search-input" placeholder="🔍 Find your tile..." autocomplete="off">
        <div id="search-results"></div>
    </div>

    <div id="info-panel">
        <h3>🎯 How to get your tile</h3>
        <p>Join our community and become part of the growing hive!</p>
        <ol class="steps">
            <li>Follow <strong>@tilegrow</strong> on Instagram</li>
            <li>Like & comment on our posts</li>
            <li>Get featured on the map!</li>
        </ol>
    </div>

    <div id="viewport">
        <div id="map-container">
            <div id="hex-grid" class="hex-grid"></div>
        </div>
    </div>

    <div id="controls">
        <button class="btn" onclick="centerOnTile('tilegrow')">⌖ Center</button>
        <button class="btn btn-primary" onclick="startTour()">🎬 Tour</button>
        <button class="btn" onclick="resetZoom()">🔍 Reset</button>
    </div>

    <script>
        // Hexagon geometry
        const HEX_WIDTH = 140;
        const HEX_HEIGHT = 160;
        const HEX_HORIZ = HEX_WIDTH * 0.75;
        const HEX_VERT = HEX_HEIGHT * 0.5;

        // Subscribers data - spiral order from center
        const subscribers = [
            { name: 'tilegrow', ig: 'tilegrow', center: true, color: '#fbbf24' },
            { name: 'alex', ig: 'alex.design' },
            { name: 'maria', ig: 'maria.art' },
            { name: 'john', ig: 'john.photo' },
            { name: 'anna', ig: 'anna.style' },
            { name: 'david', ig: 'david.creates' },
            { name: 'emma', ig: 'emma.visuals' },
            { name: 'james', ig: 'james.studio' },
            { name: 'sophia', ig: 'sophia.art' },
            { name: 'robert', ig: 'robert.design' },
            { name: 'olivia', ig: 'olivia.creates' },
            { name: 'michael', ig: 'michael.visual' },
            { name: 'isabella', ig: 'isabella.art' },
            { name: 'william', ig: 'william.studio' },
            { name: 'ava', ig: 'ava.design' },
            { name: 'richard', ig: 'richard.photo' },
            { name: 'mia', ig: 'mia.creates' },
            { name: 'joseph', ig: 'joseph.art' },
            { name: 'charlotte', ig: 'charlotte.style' },
            { name: 'thomas', ig: 'thomas.visual' },
            { name: 'amelia', ig: 'amelia.design' }
        ];

        // Calculate hex positions in spiral
        function getHexPosition(index) {
            if (index === 0) return { x: 0, y: 0 };
            
            // Hex spiral algorithm
            let ring = 1;
            let count = 1;
            while (count + ring * 6 <= index) {
                count += ring * 6;
                ring++;
            }
            
            const posInRing = index - count;
            const side = Math.floor(posInRing / ring);
            const posOnSide = posInRing % ring;
            
            // Hex directions
            const directions = [
                { x: 1, y: -1 }, { x: 1, y: 0 }, { x: 0, y: 1 },
                { x: -1, y: 1 }, { x: -1, y: 0 }, { x: 0, y: -1 }
            ];
            
            let x = ring * directions[(side + 4) % 6].x;
            let y = ring * directions[(side + 4) % 6].y;
            
            for (let i = 0; i < posOnSide; i++) {
                x += directions[side].x;
                y += directions[side].y;
            }
            
            return { x, y };
        }

        // Create hex grid
        const grid = document.getElementById('hex-grid');
        const tileElements = {};

        subscribers.forEach((sub, index) => {
            const pos = getHexPosition(index);
            const x = pos.x * HEX_HORIZ + 400;
            const y = pos.y * HEX_VERT + (pos.x % 2) * (HEX_VERT) + 300;

            const tile = document.createElement('div');
            tile.className = 'hex-tile' + (sub.center ? ' center-tile' : '');
            tile.style.left = x + 'px';
            tile.style.top = y + 'px';
            tile.dataset.name = sub.name;
            tile.dataset.ig = sub.ig;
            tile.dataset.index = index;

            const color = sub.color || `hsl(${index * 30 + 200}, 70%, 60%)`;
            
            tile.innerHTML = `
                <div class="hex-shape" style="background: linear-gradient(135deg, ${color}, ${color}dd);">
                    <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:48px;">
                        ${sub.name[0].toUpperCase()}
                    </div>
                </div>
                <span class="hex-label">@${sub.ig}</span>
            `;

            tile.addEventListener('click', () => {
                window.open(`https://instagram.com/${sub.ig}`, '_blank');
            });

            grid.appendChild(tile);
            tileElements[sub.name] = tile;
        });

        // Pan & Zoom
        let scale = 1;
        let translateX = 0;
        let translateY = 0;
        let isDragging = false;
        let lastX = 0;
        let lastY = 0;

        const container = document.getElementById('map-container');
        const viewport = document.getElementById('viewport');

        function updateTransform() {
            container.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        }

        function centerOnTile(name) {
            const tile = tileElements[name];
            if (!tile) return;
            
            const rect = tile.getBoundingClientRect();
            const viewportRect = viewport.getBoundingClientRect();
            
            translateX = (viewportRect.width / 2) - (rect.left + rect.width / 2 - translateX);
            translateY = (viewportRect.height / 2) - (rect.top + rect.height / 2 - translateY);
            scale = 1.5;
            updateTransform();
        }

        function startTour() {
            const tourSequence = ['tilegrow', 'alex', 'maria', 'john', 'anna', 'david'];
            let i = 0;
            
            function next() {
                if (i < tourSequence.length) {
                    centerOnTile(tourSequence[i]);
                    i++;
                    setTimeout(next, 2000);
                }
            }
            next();
        }

        function resetZoom() {
            scale = 1;
            translateX = 0;
            translateY = 0;
            updateTransform();
        }

        // Event listeners
        viewport.addEventListener('mousedown', e => {
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
            viewport.style.cursor = 'grabbing';
        });

        viewport.addEventListener('mousemove', e => {
            if (isDragging) {
                translateX += e.clientX - lastX;
                translateY += e.clientY - lastY;
                lastX = e.clientX;
                lastY = e.clientY;
                updateTransform();
            }
        });

        viewport.addEventListener('mouseup', () => {
            isDragging = false;
            viewport.style.cursor = 'grab';
        });

        viewport.addEventListener('wheel', e => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            scale = Math.max(0.3, Math.min(4, scale * delta));
            updateTransform();
        });

        // Touch support
        viewport.addEventListener('touchstart', e => {
            if (e.touches.length === 1) {
                isDragging = true;
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
            }
        }, { passive: false });

        viewport.addEventListener('touchmove', e => {
            if (e.touches.length === 1 && isDragging) {
                translateX += e.touches[0].clientX - lastX;
                translateY += e.touches[0].clientY - lastY;
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
                updateTransform();
                e.preventDefault();
            }
        }, { passive: false });

        viewport.addEventListener('touchend', () => {
            isDragging = false;
        });

        // Search functionality
        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');

        searchInput.addEventListener('input', e => {
            const query = e.target.value.toLowerCase();
            if (query.length < 2) {
                searchResults.style.display = 'none';
                return;
            }

            const matches = subscribers.filter(s => 
                s.name.toLowerCase().includes(query) || 
                s.ig.toLowerCase().includes(query)
            );

            searchResults.innerHTML = matches.map(s => `
                <div class="search-result-item" data-name="${s.name}">
                    @${s.ig}
                </div>
            `).join('');

            searchResults.style.display = matches.length ? 'block' : 'none';

            document.querySelectorAll('.search-result-item').forEach(item => {
                item.addEventListener('click', () => {
                    centerOnTile(item.dataset.name);
                    searchResults.style.display = 'none';
                    searchInput.value = '';
                });
            });
        });

        // Initialize
        updateTransform();
        centerOnTile('tilegrow');
    </script>
</body>
