<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TileGrow - Interactive Map</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a15; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        #viewport { width: 100vw; height: 100vh; overflow: hidden; position: relative; cursor: grab; }
        #viewport:active { cursor: grabbing; }
        #map-container { position: absolute; transform-origin: center center; transition: transform 0.08s ease-out; }
        .tile-grid { display: grid; gap: 4px; padding: 40px; }
        .tile { width: 180px; height: 180px; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.5); transition: all 0.3s ease; position: relative; cursor: pointer; }
        .tile:hover { transform: scale(1.08); box-shadow: 0 12px 40px rgba(0,0,0,0.6); z-index: 100; }
        .tile img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .tile-label { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; opacity: 0; transition: opacity 0.2s, transform 0.2s; }
        .tile:hover .tile-label { opacity: 1; transform: translateX(-50%) translateY(-5px); }
        #controls { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 1000; padding: 0 20px; flex-wrap: wrap; justify-content: center; }
        .btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 14px 28px; border-radius: 30px; font-size: 14px; font-weight: 500; cursor: pointer; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); transition: all 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn:hover { background: rgba(255,255,255,0.2); transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.4); }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none; }
        .btn-primary:hover { background: linear-gradient(135deg, #5558e0, #7c4de0); }
        #info { position: fixed; top: 30px; left: 30px; color: #fff; z-index: 1000; }
        #info h1 { font-size: 24px; margin-bottom: 8px; background: linear-gradient(135deg, #fff, #a5b4fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #info p { font-size: 14px; opacity: 0.6; }
        #stats { position: fixed; top: 30px; right: 30px; color: #fff; text-align: right; z-index: 1000; }
        #stats .number { font-size: 36px; font-weight: 700; background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #stats .label { font-size: 12px; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }
        .record-hint { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(99, 102, 241, 0.9); color: #fff; padding: 10px 20px; border-radius: 25px; font-size: 13px; opacity: 0; transition: opacity 0.5s; pointer-events: none; }
        .record-hint.show { opacity: 1; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .tile.newest { animation: glow 2s ease-in-out infinite; }
        @keyframes glow { 0%, 100% { box-shadow: 0 8px 32px rgba(99, 102, 241, 0.4); } 50% { box-shadow: 0 8px 32px rgba(99, 102, 241, 0.8); } }
    </style>
</head>
<body>
    <div id="info"><h1>🗺️ TileGrow World</h1><p>Pinch to zoom • Drag to pan • Tap tile</p></div>
    <div id="stats"><div class="number" id="tile-count">20</div><div class="label">Tiles</div></div>
    <div class="record-hint" id="record-hint">📱 Record screen for Reels</div>
    <div id="viewport"><div id="map-container"><div id="tile-grid" class="tile-grid"></div></div></div>
    <div id="controls">
        <button class="btn" onclick="resetView()">⌖ Center</button>
        <button class="btn btn-primary" onclick="animateZoomOut()">🔍 Reel Zoom</button>
        <button class="btn" onclick="autoTour()">🎬 Tour</button>
        <button class="btn" onclick="toggleLabels()">🏷️ Names</button>
    </div>

        const minX = Math.min(...tiles.map(t=>t.x)), maxX = Math.max(...tiles.map(t=>t.x));
        const minY = Math.min(...tiles.map(t=>t.y)), maxY = Math.max(...tiles.map(t=>t.y));
        const cols = maxX - minX + 1, rows = maxY - minY + 1;
        const grid = document.getElementById("tile-grid");
        grid.style.gridTemplateColumns = `repeat(${cols + 2}, 180px)`;
        grid.style.gridTemplateRows = `repeat(${rows + 2}, 180px)`;
        
        tiles.forEach((t, i) => {
            const el = document.createElement("div");
            el.className = "tile";
            el.style.gridColumn = t.x - minX + 2;
            el.style.gridRow = maxY - t.y + 2;
            el.style.opacity = "0";
            el.style.transform = "scale(0.3)";
            el.innerHTML = `<img src="${t.img}" alt="${t.name}"><span class="tile-label">@${t.name}</span>`;
            setTimeout(() => { el.style.opacity = "1"; el.style.transform = "scale(1)"; }, i * 80);
            grid.appendChild(el);
        });
        
        let scale = 2, tx = 0, ty = 0, dragging = false, lx = 0, ly = 0;
        const container = document.getElementById("map-container");
        const viewport = document.getElementById("viewport");
        
        function update() {
            container.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
            document.getElementById("tile-count").textContent = tiles.length;
        }
        
        function center() {
            const vw = viewport.clientWidth, vh = viewport.clientHeight;
            const mapW = (cols + 2) * 184, mapH = (rows + 2) * 184;
            tx = (vw - mapW) / 2 + mapW / 2;
            ty = (vh - mapH) / 2 + mapH / 2;
            update();
        }
        
        viewport.addEventListener("touchstart", e => {
            if (e.touches.length === 1) { dragging = true; lx = e.touches[0].clientX; ly = e.touches[0].clientY; }
            else if (e.touches.length === 2) { const dx = e.touches[0].clientX - e.touches[1].clientX; const dy = e.touches[0].clientY - e.touches[1].clientY; this.lastPinch = Math.sqrt(dx*dx + dy*dy); }
        }, {passive: false});
        
        viewport.addEventListener("touchmove", e => {
            if (e.touches.length === 1 && dragging) { tx += e.touches[0].clientX - lx; ty += e.touches[0].clientY - ly; lx = e.touches[0].clientX; ly = e.touches[0].clientY; update(); e.preventDefault(); }
            else if (e.touches.length === 2) { const dx = e.touches[0].clientX - e.touches[1].clientX; const dy = e.touches[0].clientY - e.touches[1].clientY; const dist = Math.sqrt(dx*dx + dy*dy); if (this.lastPinch) { scale = Math.max(0.3, Math.min(5, scale * (dist / this.lastPinch))); update(); } this.lastPinch = dist; e.preventDefault(); }
        }, {passive: false});
        
        viewport.addEventListener("touchend", () => { dragging = false; this.lastPinch = null; });
        viewport.addEventListener("wheel", e => { e.preventDefault(); scale *= e.deltaY > 0 ? 0.9 : 1.1; scale = Math.max(0.3, Math.min(5, scale)); update(); }, {passive: false});
        
        viewport.addEventListener("mousedown", e => { dragging = true; lx = e.clientX; ly = e.clientY; viewport.style.cursor = "grabbing"; });
        viewport.addEventListener("mousemove", e => { if (dragging) { tx += e.clientX - lx; ty += e.clientY - ly; lx = e.clientX; ly = e.clientY; update(); } });
        viewport.addEventListener("mouseup", () => { dragging = false; viewport.style.cursor = "grab"; });
        
        function resetView() { scale = 2; center(); }
        function animateZoomOut() { scale = 4; update(); let s = scale; const anim = () => { s -= 0.05; if (s > 0.8) { scale = s; update(); requestAnimationFrame(anim); } }; anim(); document.getElementById("record-hint").classList.add("show"); setTimeout(() => document.getElementById("record-hint").classList.remove("show"), 5000); }
        function autoTour() { scale = 3; tx = 0; ty = 0; update(); const positions = [{s:2.5,x:0,y:0},{s:1.5,x:200,y:-100},{s:1,x:0,y:200},{s:0.8,x:0,y:0}]; let i = 0; const step = () => { if (i < positions.length) { const p = positions[i]; scale = p.s; tx = p.x; ty = p.y; update(); i++; setTimeout(step, 1000); } }; step(); }
        let labelsOn = false; function toggleLabels() { labelsOn = !labelsOn; document.querySelectorAll(".tile-label").forEach(l => l.style.opacity = labelsOn ? "1" : "0"); }
        
        center();
        setTimeout(() => { 
            const hint = document.getElementById("record-hint"); 
            hint.textContent = "👆 Double tap to zoom • Drag to explore"; 
            hint.classList.add("show"); 
            setTimeout(() => hint.classList.remove("show"), 4000); 
        }, 2000);
    </script>
</body>
</html>
