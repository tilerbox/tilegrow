<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TileGrow - Interactive Map</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0a15; 
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        /* Background Canvas */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        
        #viewport { 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            position: relative; 
            cursor: grab; 
            z-index: 1;
        }
        #viewport:active { cursor: grabbing; }
        #map-container { 
            position: absolute; 
            transform-origin: center center; 
            transition: transform 0.08s ease-out; 
        }
        
        /* Hexagonal Layout */
        .hex-container {
            position: relative;
            width: 2000px;
            height: 2000px;
        }
        
        .hex-tile {
            position: absolute;
            width: 160px;
            height: 184px;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .hex-tile:hover {
            transform: translate(-50%, -50%) scale(1.1);
            z-index: 100;
        }
        
        .hex-inner {
            width: 100%;
            height: 100%;
            position: relative;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            background: #1a1a2e;
        }
        
        .hex-tile:hover .hex-inner {
            box-shadow: 0 12px 40px rgba(0,0,0,0.6);
        }
        
        .hex-tile.center .hex-inner {
            width: 200px;
            height: 230px;
            animation: glow 2s ease-in-out infinite;
        }
        
        .hex-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        .hex-label {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.2s;
            white-space: nowrap;
            pointer-events: none;
        }
        
        .hex-tile:hover .hex-label {
            opacity: 1;
        }
        
        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.4)); }
            50% { filter: drop-shadow(0 0 40px rgba(99, 102, 241, 0.8)); }
        }
        
        /* Header */
        #header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(10, 10, 21, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }
        
        #logo {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        #stats-header {
            color: #fff;
            font-size: 14px;
            opacity: 0.8;
        }
        
        #instagram-link {
            color: #fff;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        
        #instagram-link:hover { opacity: 1; }
        
        /* Left Controls */
        #controls-left {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 2000;
        }
        
        .btn {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            backdrop-filter: blur(20px);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.05);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
        }
        
        /* Right Background Selector */
        #bg-selector {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 2000;
        }
        
        .bg-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            border: 2px solid transparent;
            font-size: 22px;
            cursor: pointer;
            backdrop-filter: blur(20px);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .bg-btn:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.05);
        }
        
        .bg-btn.active {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.3);
        }
        
        /* Accordion */
        #how-to-accordion {
            position: fixed;
            top: 80px;
            left: 20px;
            width: 260px;
            z-index: 1000;
        }
        
        .accordion-header {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .accordion-header.active {
            border-radius: 10px 10px 0 0;
            background: rgba(99, 102, 241, 0.3);
        }
        
        .accordion-content {
            background: rgba(20,20,35,0.95);
            border: 1px solid rgba(255,255,255,0.1);
            border-top: none;
            border-radius: 0 0 10px 10px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        
        .accordion-content.open {
            max-height: 150px;
            padding: 16px;
        }
        
        .accordion-content p {
            color: rgba(255,255,255,0.8);
            font-size: 12px;
            line-height: 1.5;
            margin-bottom: 8px;
        }
        
        .accordion-content a {
            color: #6366f1;
            text-decoration: none;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            #controls-left {
                left: 10px;
                gap: 8px;
            }
            .btn {
                width: 44px;
                height: 44px;
                font-size: 18px;
            }
            #bg-selector {
                right: 10px;
                gap: 6px;
            }
            .bg-btn {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
            #how-to-accordion {
                width: 200px;
            }
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <!-- Header -->
    <div id="header">
        <div id="logo">TileGrow</div>
        <div id="stats-header"><span id="tile-count">0</span> tiles</div>
        <a href="https://instagram.com/tilegrow" target="_blank" id="instagram-link">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="2" width="20" height="20" rx="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
        </a>
    </div>
    
    <!-- Left Controls -->
    <div id="controls-left">
        <button class="btn" onclick="center()" title="Center">⌖</button>
        <button class="btn btn-primary" onclick="animateZoomOut()" title="Reel Zoom">🔍</button>
        <button class="btn" onclick="autoTour()" title="Tour">🎬</button>
        <button class="btn" onclick="toggleLabels()" title="Names">🏷️</button>
    </div>
    
    <!-- Right Background Selector -->
    <div id="bg-selector">
        <button class="bg-btn active" onclick="setBackground('waves')" title="Waves">🌊</button>
        <button class="bg-btn" onclick="setBackground('particles')" title="Particles">✨</button>
        <button class="bg-btn" onclick="setBackground('morphing')" title="Morphing">🌀</button>
    </div>
    
    <!-- Accordion -->
    <div id="how-to-accordion">
        <div class="accordion-header" onclick="toggleAccordion()">
            <span>📱 How to get your tile</span>
            <span>▼</span>
        </div>
        <div class="accordion-content" id="accordion-content">
            <p>1. Follow <a href="https://instagram.com/tilegrow" target="_blank">@tilegrow</a></p>
            <p>2. Send DM with your name</p>
            <p>3. We'll add you to the map!</p>
        </div>
    </div>
    
    <!-- Viewport -->
    <div id="viewport">
        <div id="map-container">
            <div class="hex-container" id="hex-container"></div>
        </div>
    </div>

    <script>
        // Tile data
        const tiles = [
            {id: 1, name: "TileGrow", type: "center", src: null},
            {id: 2, name: "Abigail", type: "subscriber", src: "tiles/abigail.png"},
            {id: 3, name: "Alex", type: "subscriber", src: "tiles/alex.png"},
            {id: 4, name: "Amelia", type: "subscriber", src: "tiles/amelia.png"},
            {id: 5, name: "Andrew", type: "subscriber", src: "tiles/andrew.png"},
            {id: 6, name: "Anna", type: "subscriber", src: "tiles/anna.png"},
            {id: 7, name: "Anthony", type: "subscriber", src: "tiles/anthony.png"},
            {id: 8, name: "Ava", type: "subscriber", src: "tiles/ava.png"},
            {id: 9, name: "Avery", type: "subscriber", src: "tiles/avery.png"},
            {id: 10, name: "Brian", type: "subscriber", src: "tiles/brian.png"},
            {id: 11, name: "Charles", type: "subscriber", src: "tiles/charles.png"},
            {id: 12, name: "Charlotte", type: "subscriber", src: "tiles/charlotte.png"},
            {id: 13, name: "Chloe", type: "subscriber", src: "tiles/chloe.png"},
            {id: 14, name: "Daniel", type: "subscriber", src: "tiles/daniel.png"},
            {id: 15, name: "David", type: "subscriber", src: "tiles/david.png"},
            {id: 16, name: "Donald", type: "subscriber", src: "tiles/donald.png"},
            {id: 17, name: "Edward", type: "subscriber", src: "tiles/edward.png"},
            {id: 18, name: "Elizabeth", type: "subscriber", src: "tiles/elizabeth.png"},
            {id: 19, name: "Ella", type: "subscriber", src: "tiles/ella.png"},
            {id: 20, name: "Emily", type: "subscriber", src: "tiles/emily.png"}
        ];

        // Hexagonal ring layout - proper order
        function createHexLayout() {
            const container = document.getElementById('hex-container');
            const subscriberTiles = tiles.filter(t => t.type === 'subscriber');
            const centerTile = tiles.find(t => t.type === 'center');
            
            const hexSize = 160;
            const w = hexSize * 0.866; // width of hex (sqrt(3)/2)
            const h = hexSize * 0.75;  // vertical distance between rows
            
            // Center position
            const centerX = 1000;
            const centerY = 1000;
            
            // Place center tile (TileGrow)
            const centerEl = document.createElement('div');
            centerEl.className = 'hex-tile center';
            centerEl.style.left = centerX + 'px';
            centerEl.style.top = centerY + 'px';
            centerEl.innerHTML = `
                <div class="hex-inner" style="background: linear-gradient(135deg, #6366f1, #8b5cf6); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;">
                    <div style="font-size: 24px; font-weight: bold;">Tile</div>
                    <div style="font-size: 24px; font-weight: bold;">Grow</div>
                    <div class="hex-label">${centerTile.name}</div>
                </div>
            `;
            container.appendChild(centerEl);
            
            // Generate hex positions in ring order (as shown on AB's diagram)
            // Ring 1: 6 positions around center
            // Ring 2: 12 positions, etc.
            const positions = [];
            
            // Helper to add position
            function addPosition(q, r) {
                // Convert axial coordinates to pixel
                const x = centerX + w * (q + r/2);
                const y = centerY + h * r;
                positions.push({x, y});
            }
            
            // Ring 0: center (already placed)
            
            // Ring 1: 6 tiles around center (starting from right, going clockwise)
            // Directions: E, NE, NW, W, SW, SE
            const ring1 = [
                [1, 0], [1, -1], [0, -1], [-1, 0], [-1, 1], [0, 1]
            ];
            ring1.forEach(([q, r]) => addPosition(q, r));
            
            // Ring 2: 12 tiles
            const ring2 = [
                [2, 0], [2, -1], [2, -2], [1, -2], [0, -2], 
                [-1, -1], [-2, 0], [-2, 1], [-2, 2], [-1, 2], 
                [0, 2], [1, 1]
            ];
            ring2.forEach(([q, r]) => addPosition(q, r));
            
            // Ring 3: 18 tiles
            const ring3 = [
                [3, 0], [3, -1], [3, -2], [3, -3], [2, -3], [1, -3], [0, -3],
                [-1, -2], [-2, -2], [-3, 0], [-3, 1], [-3, 2], [-3, 3],
                [-2, 3], [-1, 3], [0, 3], [1, 2], [2, 1]
            ];
            ring3.forEach(([q, r]) => addPosition(q, r));
            
            // Place tiles in ring order
            let tileIndex = 0;
            positions.forEach((pos, i) => {
                if (tileIndex >= subscriberTiles.length) return;
                
                const tile = subscriberTiles[tileIndex];
                const tileEl = document.createElement('div');
                tileEl.className = 'hex-tile';
                tileEl.style.left = pos.x + 'px';
                tileEl.style.top = pos.y + 'px';
                tileEl.innerHTML = `
                    <div class="hex-inner">
                        <img src="${tile.src}" alt="${tile.name}" onerror="this.style.display='none'; this.parentElement.style.background='linear-gradient(135deg, #8b5cf6, #6366f1)'">
                        <div class="hex-label">${tile.name}</div>
                    </div>
                `;
                container.appendChild(tileEl);
                tileIndex++;
            });
            
            document.getElementById('tile-count').textContent = tiles.length;
        }

        // Accordion
        function toggleAccordion() {
            const header = document.querySelector('.accordion-header');
            const content = document.getElementById('accordion-content');
            header.classList.toggle('active');
            content.classList.toggle('open');
        }

        // Background System
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        let bgAnimationId;
        let currentBg = 'waves';

        function resizeCanvas() {
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Background: Gradient Waves
        let waveOffset = 0;
        function drawWaves() {
            bgCtx.fillStyle = '#0a0a15';
            bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
            
            const waves = [
                {color: 'rgba(99, 102, 241, 0.1)', speed: 0.005, amplitude: 50, frequency: 0.01},
                {color: 'rgba(139, 92, 246, 0.08)', speed: 0.003, amplitude: 70, frequency: 0.008},
                {color: 'rgba(99, 102, 241, 0.05)', speed: 0.007, amplitude: 40, frequency: 0.012}
            ];
            
            waves.forEach((wave, i) => {
                bgCtx.beginPath();
                bgCtx.fillStyle = wave.color;
                for (let x = 0; x < bgCanvas.width; x++) {
                    const y = bgCanvas.height / 2 + Math.sin(x * wave.frequency + waveOffset * wave.speed + i) * wave.amplitude;
                    if (x === 0) bgCtx.moveTo(x, y);
                    else bgCtx.lineTo(x, y);
                }
                bgCtx.lineTo(bgCanvas.width, bgCanvas.height);
                bgCtx.lineTo(0, bgCanvas.height);
                bgCtx.fill();
            });
            
            waveOffset++;
            if (currentBg === 'waves') bgAnimationId = requestAnimationFrame(drawWaves);
        }

        // Background: Connected Particles
        const particles = Array.from({length: 50}, () => ({
            x: Math.random() * window.innerWidth,
            y: Math.random() * window.innerHeight,
            vx: (Math.random() - 0.5) * 0.5,
            vy: (Math.random() - 0.5) * 0.5
        }));

        function drawParticles() {
            bgCtx.fillStyle = '#0a0a15';
            bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
            
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > bgCanvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > bgCanvas.height) p.vy *= -1;
            });
            
            bgCtx.strokeStyle = 'rgba(99, 102, 241, 0.15)';
            bgCtx.lineWidth = 1;
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    if (Math.sqrt(dx*dx + dy*dy) < 150) {
                        bgCtx.beginPath();
                        bgCtx.moveTo(particles[i].x, particles[i].y);
                        bgCtx.lineTo(particles[j].x, particles[j].y);
                        bgCtx.stroke();
                    }
                }
            }
            
            bgCtx.fillStyle = 'rgba(99, 102, 241, 0.4)';
            particles.forEach(p => {
                bgCtx.beginPath();
                bgCtx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                bgCtx.fill();
            });
            
            if (currentBg === 'particles') bgAnimationId = requestAnimationFrame(drawParticles);
        }

        // Background: Morphing Geometry
        let morphTime = 0;
        function drawMorphing() {
            bgCtx.fillStyle = '#0a0a15';
            bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
            
            for (let i = 0; i < 5; i++) {
                const x = bgCanvas.width / 2 + Math.sin(morphTime * 0.001 + i * 1.5) * 200;
                const y = bgCanvas.height / 2 + Math.cos(morphTime * 0.0015 + i * 1.2) * 150;
                const radius = 100 + Math.sin(morphTime * 0.002 + i) * 50;
                
                const gradient = bgCtx.createRadialGradient(x, y, 0, x, y, radius);
                gradient.addColorStop(0, `rgba(99, 102, 241, ${0.1 - i * 0.015})`);
                gradient.addColorStop(1, 'transparent');
                
                bgCtx.fillStyle = gradient;
                bgCtx.beginPath();
                bgCtx.arc(x, y, radius, 0, Math.PI * 2);
                bgCtx.fill();
            }
            
            morphTime++;
            if (currentBg === 'morphing') bgAnimationId = requestAnimationFrame(drawMorphing);
        }

        function setBackground(type) {
            if (bgAnimationId) cancelAnimationFrame(bgAnimationId);
            currentBg = type;
            
            document.querySelectorAll('.bg-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            localStorage.setItem('tilegrow-bg', type);
            
            if (type === 'waves') drawWaves();
            else if (type === 'particles') drawParticles();
            else if (type === 'morphing') drawMorphing();
        }

        // Viewport controls
        let scale = 0.8, tx = 0, ty = 0, dragging = false, lx = 0, ly = 0;
        const container = document.getElementById('map-container');
        const viewport = document.getElementById('viewport');

        function update() {
            container.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
        }

        function center() {
            tx = (viewport.clientWidth - 2000 * scale) / 2;
            ty = (viewport.clientHeight - 2000 * scale) / 2;
            update();
        }

        viewport.addEventListener('mousedown', e => { dragging = true; lx = e.clientX; ly = e.clientY; });
        viewport.addEventListener('mousemove', e => { 
            if (dragging) { tx += e.clientX - lx; ty += e.clientY - ly; lx = e.clientX; ly = e.clientY; update(); }
        });
        viewport.addEventListener('mouseup', () => dragging = false);
        viewport.addEventListener('wheel', e => { 
            e.preventDefault(); 
            scale *= e.deltaY > 0 ? 0.9 : 1.1; 
            scale = Math.max(0.3, Math.min(3, scale)); 
            update(); 
        }, {passive: false});

        // Touch support
        viewport.addEventListener('touchstart', e => {
            if (e.touches.length === 1) {
                dragging = true;
                lx = e.touches[0].clientX;
                ly = e.touches[0].clientY;
            }
        }, {passive: false});
        viewport.addEventListener('touchmove', e => {
            if (dragging && e.touches.length === 1) {
                tx += e.touches[0].clientX - lx;
                ty += e.touches[0].clientY - ly;
                lx = e.touches[0].clientX;
                ly = e.touches[0].clientY;
                update();
                e.preventDefault();
            }
        }, {passive: false});
        viewport.addEventListener('touchend', () => dragging = false);

        function animateZoomOut() {
            scale = 1.5;
            center();
            let s = scale;
            const anim = () => { 
                s -= 0.02; 
                if (s > 0.4) { scale = s; update(); requestAnimationFrame(anim); }
            }; 
            anim();
        }

        function autoTour() {
            scale = 1;
            center();
            const positions = [{s:0.9, x:50, y:-30}, {s:0.7, x:0, y:80}, {s:0.5, x:0, y:0}];
            let i = 0;
            const step = () => { 
                if (i < positions.length) { 
                    scale = positions[i].s;
                    tx = positions[i].x + (viewport.clientWidth - 2000 * scale) / 2;
                    ty = positions[i].y + (viewport.clientHeight - 2000 * scale) / 2;
                    update();
                    i++;
                    setTimeout(step, 1500);
                }
            };
            step();
        }

        let labelsOn = false;
        function toggleLabels() {
            labelsOn = !labelsOn;
            document.querySelectorAll('.hex-label').forEach(l => l.style.opacity = labelsOn ? '1' : '');
        }

        // Initialize
        createHexLayout();
        center();
        const savedBg = localStorage.getItem('tilegrow-bg') || 'waves';
        if (savedBg === 'waves') drawWaves();
        else if (savedBg === 'particles') drawParticles();
        else if (savedBg === 'morphing') drawMorphing();
    </script>
</body>
</html>
