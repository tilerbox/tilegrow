<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TileGrow - Interactive Map</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0a15; 
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        /* Background Canvas */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        
        #viewport { 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            position: relative; 
            cursor: grab; 
            z-index: 1;
        }
        #viewport:active { cursor: grabbing; }
        #map-container { 
            position: absolute; 
            transform-origin: center center; 
            transition: transform 0.08s ease-out; 
        }
        
        /* Orbital Layout Styles */
        .orbital-container {
            position: relative;
            width: 1200px;
            height: 1200px;
        }
        
        .center-tile {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }
        
        .orbit-ring {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 50%;
        }
        
        .orbit-tile {
            position: absolute;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        
        .tile { 
            width: 140px; 
            height: 140px; 
            border-radius: 16px; 
            overflow: hidden; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.5); 
            transition: all 0.3s ease; 
            cursor: pointer;
            background: #1a1a2e;
        }
        
        .tile:hover { 
            transform: scale(1.15); 
            box-shadow: 0 12px 40px rgba(0,0,0,0.6); 
            z-index: 100; 
        }
        
        .center-tile .tile {
            width: 200px;
            height: 200px;
            box-shadow: 0 12px 48px rgba(99, 102, 241, 0.4);
            animation: glow 2s ease-in-out infinite;
        }
        
        .tile img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block; 
        }
        
        .tile-label { 
            position: absolute; 
            bottom: 10px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: rgba(0,0,0,0.8); 
            color: #fff; 
            padding: 6px 12px; 
            border-radius: 20px; 
            font-size: 12px; 
            font-weight: 600; 
            opacity: 0; 
            transition: opacity 0.2s, transform 0.2s; 
            white-space: nowrap;
        }
        
        .tile:hover .tile-label { 
            opacity: 1; 
            transform: translateX(-50%) translateY(-5px); 
        }
        
        @keyframes glow { 
            0%, 100% { box-shadow: 0 12px 48px rgba(99, 102, 241, 0.4); } 
            50% { box-shadow: 0 12px 48px rgba(99, 102, 241, 0.8); } 
        }
        
        /* Header */
        #header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(10, 10, 21, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 1000;
        }
        
        #logo {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        
        #search-bar {
            position: relative;
            flex: 0 1 400px;
            max-width: 400px;
        }
        
        #search-input {
            width: 100%;
            height: 42px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 21px;
            padding: 0 42px 0 20px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }
        
        #search-input::placeholder {
            color: rgba(255,255,255,0.4);
        }
        
        #search-input:focus {
            background: rgba(255,255,255,0.12);
            border-color: rgba(99, 102, 241, 0.5);
        }
        
        #search-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.5;
            font-size: 14px;
            pointer-events: none;
        }
        
        #instagram-link {
            color: #fff;
            opacity: 0.7;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
        }
        
        #instagram-link:hover {
            opacity: 1;
        }
        
        /* Stats */
        #stats { 
            position: fixed; 
            top: 90px; 
            right: 30px; 
            color: #fff; 
            text-align: right; 
            z-index: 1000; 
        }
        #stats .number { 
            font-size: 36px; 
            font-weight: 700; 
            background: linear-gradient(135deg, #6366f1, #8b5cf6); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        #stats .label { 
            font-size: 12px; 
            opacity: 0.6; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }
        
        /* Accordion */
        #how-to-accordion {
            position: fixed;
            top: 90px;
            left: 30px;
            width: 280px;
            z-index: 1000;
        }
        
        .accordion-header {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .accordion-header:hover {
            background: rgba(255,255,255,0.15);
        }
        
        .accordion-header.active {
            border-radius: 12px 12px 0 0;
            background: rgba(99, 102, 241, 0.3);
        }
        
        .accordion-icon {
            transition: transform 0.3s ease;
        }
        
        .accordion-header.active .accordion-icon {
            transform: rotate(180deg);
        }
        
        .accordion-content {
            background: rgba(20,20,35,0.9);
            border: 1px solid rgba(255,255,255,0.1);
            border-top: none;
            border-radius: 0 0 12px 12px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, padding 0.3s ease;
        }
        
        .accordion-content.open {
            max-height: 200px;
            padding: 20px;
        }
        
        .accordion-content p {
            color: rgba(255,255,255,0.8);
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 12px;
        }
        
        .accordion-content a {
            color: #6366f1;
            text-decoration: none;
            font-weight: 600;
        }
        
        .accordion-content a:hover {
            text-decoration: underline;
        }
        
        /* Controls */
        #controls { 
            position: fixed; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%); 
            display: flex; 
            gap: 12px; 
            z-index: 2000; 
            padding: 0 20px; 
            flex-wrap: wrap; 
            justify-content: center; 
            pointer-events: auto;
        }
        
        .btn { 
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.2); 
            color: #fff; 
            padding: 14px 28px; 
            border-radius: 30px; 
            font-size: 14px; 
            font-weight: 500; 
            cursor: pointer; 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            transition: all 0.2s; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            pointer-events: auto;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        
        .btn:hover { 
            background: rgba(255,255,255,0.2); 
            transform: translateY(-3px); 
            box-shadow: 0 8px 25px rgba(0,0,0,0.4); 
        }
        
        .btn:active {
            transform: translateY(-1px);
        }
        
        .btn-primary { 
            background: linear-gradient(135deg, #6366f1, #8b5cf6); 
            border: none; 
        }
        
        .btn-primary:hover { 
            background: linear-gradient(135deg, #5558e0, #7c4de0); 
        }
        
        .btn { 
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.2); 
            color: #fff; 
            padding: 14px 28px; 
            border-radius: 30px; 
            font-size: 14px; 
            font-weight: 500; 
            cursor: pointer; 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            transition: all 0.2s; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
        }
        
        .btn:hover { 
            background: rgba(255,255,255,0.2); 
            transform: translateY(-3px); 
            box-shadow: 0 8px 25px rgba(0,0,0,0.4); 
        }
        
        .btn-primary { 
            background: linear-gradient(135deg, #6366f1, #8b5cf6); 
            border: none; 
        }
        
        .btn-primary:hover { 
            background: linear-gradient(135deg, #5558e0, #7c4de0); 
        }
        
        /* Background Selector */
        #bg-selector {
            position: fixed;
            bottom: 100px;
            right: 30px;
            z-index: 1000;
            background: rgba(20,20,35,0.9);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 16px;
            backdrop-filter: blur(20px);
        }
        
        #bg-selector h3{
            color: #fff;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            opacity: 0.8;
        }
        
        .bg-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .bg-option {
            background: rgba(255,255,255,0.05);
            border: 2px solid transparent;
            color: #fff;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }
        
        .bg-option:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .bg-option.active {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.2);
        }
        
        .record-hint { 
            position: fixed; 
            bottom: 100px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: rgba(99, 102, 241, 0.9); 
            color: #fff; 
            padding: 10px 20px; 
            border-radius: 25px; 
            font-size: 13px; 
            opacity: 0; 
            transition: opacity 0.5s; 
            pointer-events: none; 
            z-index: 999;
        }
        
        .record-hint.show { 
            opacity: 1; 
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <!-- Header -->
    <div id="header">
        <div id="logo">TileGrow</div>
        <div id="search-bar">
            <input type="text" id="search-input" placeholder="Search tiles..." onkeyup="searchTiles(this.value)">
            <span id="search-icon">🔍</span>
        </div>
        <a href="https://instagram.com/tilegrow" target="_blank" id="instagram-link" title="@tilegrow on Instagram">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
        </a>
    </div>
    
    <div id="stats">
        <div class="number" id="tile-count">20</div>
        <div class="label">Tiles</div>
    </div>
    
    <div id="how-to-accordion">
        <div class="accordion-header" onclick="toggleAccordion()">
            <span>📱 How to get your tile</span>
            <span class="accordion-icon">▼</span>
        </div>
        <div class="accordion-content" id="accordion-content">
            <p>1. Follow <a href="https://instagram.com/tilegrow" target="_blank">@tilegrow</a> on Instagram</p>
            <p>2. Send us a DM with your name</p>
            <p>3. We'll generate your unique tile and add you to the map!</p>
        </div>
    </div>
    
    <div class="record-hint" id="record-hint">📱 Record screen for Reels</div>
    
    <div id="viewport">
        <div id="map-container">
            <div class="orbital-container" id="orbital-container">
                <!-- Center tile -->
                <div class="center-tile" id="center-tile"></div>
                
                <!-- Orbit rings -->
                <div class="orbit-ring" style="width: 300px; height: 300px;"></div>
                <div class="orbit-ring" style="width: 500px; height: 500px;"></div>
                <div class="orbit-ring" style="width: 700px; height: 700px;"></div>
                
                <!-- Subscriber tiles container -->
                <div id="orbit-tiles"></div>
            </div>
        </div>
    </div>
    
    <div id="controls">
        <button class="btn" onclick="center()">⌖ Center</button>
        <button class="btn btn-primary" onclick="animateZoomOut()">🔍 Reel Zoom</button>
        <button class="btn" onclick="autoTour()">🎬 Tour</button>
        <button class="btn" onclick="toggleLabels()">🏷️ Names</button>
    </div>
    
    <div id="bg-selector">
        <h3>Background Style</h3>
        <div class="bg-options">
            <div class="bg-option active" onclick="setBackground('waves')" data-bg="waves">
                🌊 Gradient Waves
            </div>
            <div class="bg-option" onclick="setBackground('particles')" data-bg="particles">
                ✨ Connected Particles
            </div>
            <div class="bg-option" onclick="setBackground('morphing')" data-bg="morphing">
                🌀 Morphing Geometry
            </div>
        </div>
    </div>

    <script>
        // Sample tile data - using actual files from tiles/
        const tiles = [
            {id: 1, name: "TileGrow", type: "center", src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%236366f1'/%3E%3Cstop offset='100%25' style='stop-color:%238b5cf6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect fill='url(%23g)' width='200' height='200' rx='16'/%3E%3Ctext fill='white' x='100' y='95' text-anchor='middle' font-size='28' font-weight='bold' font-family='system-ui'%3ETile%3C/text%3E%3Ctext fill='white' x='100' y='125' text-anchor='middle' font-size='28' font-weight='bold' font-family='system-ui'%3EGrow%3C/text%3E%3C/svg%3E"},
            {id: 2, name: "Abigail", type: "subscriber", src: "tiles/abigail.png"},
            {id: 3, name: "Alex", type: "subscriber", src: "tiles/alex.png"},
            {id: 4, name: "Amelia", type: "subscriber", src: "tiles/amelia.png"},
            {id: 5, name: "Andrew", type: "subscriber", src: "tiles/andrew.png"},
            {id: 6, name: "Anna", type: "subscriber", src: "tiles/anna.png"},
            {id: 7, name: "Anthony", type: "subscriber", src: "tiles/anthony.png"},
            {id: 8, name: "Ava", type: "subscriber", src: "tiles/ava.png"},
            {id: 9, name: "Avery", type: "subscriber", src: "tiles/avery.png"},
            {id: 10, name: "Brian", type: "subscriber", src: "tiles/brian.png"},
            {id: 11, name: "Charles", type: "subscriber", src: "tiles/charles.png"},
            {id: 12, name: "Charlotte", type: "subscriber", src: "tiles/charlotte.png"},
            {id: 13, name: "Chloe", type: "subscriber", src: "tiles/chloe.png"},
            {id: 14, name: "Daniel", type: "subscriber", src: "tiles/daniel.png"},
            {id: 15, name: "David", type: "subscriber", src: "tiles/david.png"},
            {id: 16, name: "Donald", type: "subscriber", src: "tiles/donald.png"},
            {id: 17, name: "Edward", type: "subscriber", src: "tiles/edward.png"},
            {id: 18, name: "Elizabeth", type: "subscriber", src: "tiles/elizabeth.png"},
            {id: 19, name: "Ella", type: "subscriber", src: "tiles/ella.png"},
            {id: 20, name: "Emily", type: "subscriber", src: "tiles/emily.png"},
        ];

        // Orbital Layout
        function createOrbitalLayout() {
            const centerTile = document.getElementById('center-tile');
            const orbitContainer = document.getElementById('orbit-tiles');
            const subscriberTiles = tiles.filter(t => t.type === 'subscriber');
            const center = tiles.find(t => t.type === 'center');
            
            // Center tile
            centerTile.innerHTML = `
                <div class="tile">
                    <img src="${center.src}" alt="${center.name}">
                    <div class="tile-label">${center.name}</div>
                </div>
            `;
            
            // Distribute subscribers in orbital rings
            const rings = [
                {radius: 200, count: 6, startAngle: 0},
                {radius: 350, count: 8, startAngle: Math.PI / 8},
                {radius: 500, count: 6, startAngle: 0}
            ];
            
            let tileIndex = 0;
            rings.forEach(ring => {
                const angleStep = (2 * Math.PI) / ring.count;
                for (let i = 0; i < ring.count && tileIndex < subscriberTiles.length; i++) {
                    const tile = subscriberTiles[tileIndex];
                    const angle = ring.startAngle + (i * angleStep);
                    const x = 600 + ring.radius * Math.cos(angle); // 600 is center of 1200px container
                    const y = 600 + ring.radius * Math.sin(angle);
                    
                    const tileEl = document.createElement('div');
                    tileEl.className = 'orbit-tile';
                    tileEl.style.left = x + 'px';
                    tileEl.style.top = y + 'px';
                    tileEl.innerHTML = `
                        <div class="tile">
                            <img src="${tile.src}" alt="${tile.name}">
                            <div class="tile-label">${tile.name}</div>
                        </div>
                    `;
                    orbitContainer.appendChild(tileEl);
                    tileIndex++;
                }
            });
            
            // Update tile count
            document.getElementById('tile-count').textContent = tiles.length;
        }

        // Accordion
        function toggleAccordion() {
            const header = document.querySelector('.accordion-header');
            const content = document.getElementById('accordion-content');
            header.classList.toggle('active');
            content.classList.toggle('open');
        }

        // Background System
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        let bgAnimationId;
        let currentBg = 'waves';

        function resizeCanvas() {
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Background: Gradient Waves
        let waveOffset = 0;
        function drawWaves() {
            bgCtx.fillStyle = '#0a0a15';
            bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
            
            const waves = [
                {color: 'rgba(99, 102, 241, 0.1)', speed: 0.005, amplitude: 50, frequency: 0.01},
                {color: 'rgba(139, 92, 246, 0.08)', speed: 0.003, amplitude: 70, frequency: 0.008},
                {color: 'rgba(99, 102, 241, 0.05)', speed: 0.007, amplitude: 40, frequency: 0.012}
            ];
            
            waves.forEach((wave, i) => {
                bgCtx.beginPath();
                bgCtx.fillStyle = wave.color;
                for (let x = 0; x < bgCanvas.width; x++) {
                    const y = bgCanvas.height / 2 + Math.sin(x * wave.frequency + waveOffset * wave.speed + i) * wave.amplitude;
                    if (x === 0) bgCtx.moveTo(x, y);
                    else bgCtx.lineTo(x, y);
                }
                bgCtx.lineTo(bgCanvas.width, bgCanvas.height);
                bgCtx.lineTo(0, bgCanvas.height);
                bgCtx.fill();
            });
            
            waveOffset++;
            if (currentBg === 'waves') bgAnimationId = requestAnimationFrame(drawWaves);
        }

        // Background: Connected Particles
        const particles = [];
        for (let i = 0; i < 50; i++) {
            particles.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5
            });
        }

        function drawParticles() {
            bgCtx.fillStyle = '#0a0a15';
            bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
            
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > bgCanvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > bgCanvas.height) p.vy *= -1;
            });
            
            bgCtx.strokeStyle = 'rgba(99, 102, 241, 0.15)';
            bgCtx.lineWidth = 1;
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        bgCtx.beginPath();
                        bgCtx.moveTo(particles[i].x, particles[i].y);
                        bgCtx.lineTo(particles[j].x, particles[j].y);
                        bgCtx.stroke();
                    }
                }
            }
            
            bgCtx.fillStyle = 'rgba(99, 102, 241, 0.4)';
            particles.forEach(p => {
                bgCtx.beginPath();
                bgCtx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                bgCtx.fill();
            });
            
            if (currentBg === 'particles') bgAnimationId = requestAnimationFrame(drawParticles);
        }

        // Background: Morphing Geometry
        let morphTime = 0;
        function drawMorphing() {
            bgCtx.fillStyle = '#0a0a15';
            bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
            
            const shapes = 5;
            for (let i = 0; i < shapes; i++) {
                const x = bgCanvas.width / 2 + Math.sin(morphTime * 0.001 + i * 1.5) * 200;
                const y = bgCanvas.height / 2 + Math.cos(morphTime * 0.0015 + i * 1.2) * 150;
                const radius = 100 + Math.sin(morphTime * 0.002 + i) * 50;
                
                const gradient = bgCtx.createRadialGradient(x, y, 0, x, y, radius);
                gradient.addColorStop(0, `rgba(99, 102, 241, ${0.1 - i * 0.015})`);
                gradient.addColorStop(1, 'transparent');
                
                bgCtx.fillStyle = gradient;
                bgCtx.beginPath();
                bgCtx.arc(x, y, radius, 0, Math.PI * 2);
                bgCtx.fill();
            }
            
            morphTime++;
            if (currentBg === 'morphing') bgAnimationId = requestAnimationFrame(drawMorphing);
        }

        function setBackground(type) {
            if (bgAnimationId) cancelAnimationFrame(bgAnimationId);
            currentBg = type;
            
            document.querySelectorAll('.bg-option').forEach(opt => opt.classList.remove('active'));
            document.querySelector(`[data-bg="${type}"]`).classList.add('active');
            localStorage.setItem('tilegrow-bg', type);
            
            if (type === 'waves') drawWaves();
            else if (type === 'particles') drawParticles();
            else if (type === 'morphing') drawMorphing();
        }

        // Viewport controls
        let scale = 1, tx = 0, ty = 0, dragging = false, lx = 0, ly = 0;
        const container = document.getElementById('map-container');
        const viewport = document.getElementById('viewport');

        function update() {
            container.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
        }

        function center() {
            const vw = viewport.clientWidth, vh = viewport.clientHeight;
            tx = (vw - 1200) / 2;
            ty = (vh - 1200) / 2;
            update();
        }

        viewport.addEventListener('mousedown', e => { dragging = true; lx = e.clientX; ly = e.clientY; viewport.style.cursor = 'grabbing'; });
        viewport.addEventListener('mousemove', e => { 
            if (dragging) { tx += e.clientX - lx; ty += e.clientY - ly; lx = e.clientX; ly = e.clientY; update(); }
        });
        viewport.addEventListener('mouseup', () => { dragging = false; viewport.style.cursor = 'grab'; });
        viewport.addEventListener('wheel', e => { 
            e.preventDefault(); 
            scale *= e.deltaY > 0 ? 0.9 : 1.1; 
            scale = Math.max(0.3, Math.min(5, scale)); 
            update(); 
        }, {passive: false});
        
        // Touch support
        viewport.addEventListener('touchstart', e => {
            if (e.touches.length === 1) {
                dragging = true;
                lx = e.touches[0].clientX;
                ly = e.touches[0].clientY;
            }
        }, {passive: false});
        viewport.addEventListener('touchmove', e => {
            if (dragging && e.touches.length === 1) {
                tx += e.touches[0].clientX - lx;
                ty += e.touches[0].clientY - ly;
                lx = e.touches[0].clientX;
                ly = e.touches[0].clientY;
                update();
                e.preventDefault();
            }
        }, {passive: false});
        viewport.addEventListener('touchend', () => { dragging = false; });

        function animateZoomOut() { 
            scale = 2; update(); 
            let s = scale; 
            const anim = () => { 
                s -= 0.02; 
                if (s > 0.6) { scale = s; update(); requestAnimationFrame(anim); }
            }; 
            anim(); 
            document.getElementById('record-hint').classList.add('show'); 
            setTimeout(() => document.getElementById('record-hint').classList.remove('show'), 5000); 
        }

        function autoTour() { 
            scale = 1.5; center(); 
            const positions = [{s:1.2,x:0,y:0},{s:0.9,x:100,y:-50},{s:0.7,x:0,y:100},{s:0.5,x:0,y:0}]; 
            let i = 0; 
            const step = () => { 
                if (i < positions.length) { 
                    const p = positions[i]; scale = p.s; tx = p.x + (viewport.clientWidth - 1200) / 2; ty = p.y + (viewport.clientHeight - 1200) / 2; 
                    update(); i++; setTimeout(step, 1200); 
                }
            }; 
            step(); 
        }

        let labelsOn = false;
        function toggleLabels() { 
            labelsOn = !labelsOn; 
            document.querySelectorAll('.tile-label').forEach(l => l.style.opacity = labelsOn ? '1' : '');
        }

        // Search functionality
        function searchTiles(query) {
            const lowerQuery = query.toLowerCase().trim();
            const allTiles = document.querySelectorAll('.orbit-tile, .center-tile');
            
            allTiles.forEach(tileEl => {
                const name = tileEl.querySelector('.tile-label')?.textContent.toLowerCase() || '';
                if (lowerQuery === '') {
                    tileEl.style.opacity = '1';
                    tileEl.style.filter = 'none';
                } else if (name.includes(lowerQuery)) {
                    tileEl.style.opacity = '1';
                    tileEl.style.filter = 'drop-shadow(0 0 10px rgba(99, 102, 241, 0.8))';
                } else {
                    tileEl.style.opacity = '0.3';
                    tileEl.style.filter = 'none';
                }
            });
        }

        // Initialize
        createOrbitalLayout();
        center();
        const savedBg = localStorage.getItem('tilegrow-bg') || 'waves';
        setBackground(savedBg);

        setTimeout(() => { 
            const hint = document.getElementById('record-hint'); 
            hint.textContent = '👆 Double tap to zoom • Drag to explore'; 
            hint.classList.add('show'); 
            setTimeout(() => hint.classList.remove('show'), 4000); 
        }, 2000);
